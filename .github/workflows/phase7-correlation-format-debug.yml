name: Phase 7 Correlation Format Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Format request correlation test
        run: vendor/bin/pint tests/Feature/Operations/RequestCorrelationTest.php --no-ansi

      - name: Upload formatted file
        uses: actions/upload-artifact@v4
        with:
          name: phase7-correlation-formatted-test
          path: tests/Feature/Operations/RequestCorrelationTest.php
