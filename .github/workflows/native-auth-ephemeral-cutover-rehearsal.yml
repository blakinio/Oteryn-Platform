name: Native Auth Ephemeral Cutover Rehearsal

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/native-auth-ephemeral-cutover-rehearsal.yml"
      - "tests/e2e/native_auth_ephemeral_cutover/**"
      - "docs/agents/tasks/active/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal.md"

permissions:
  contents: read
  actions: read

concurrency:
  group: platform-native-auth-ephemeral-cutover-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PLATFORM_REF: b5dd6a7be5c704d5706241240e06f8bb8c4b5efe
  GATEWAY_REF: 53158217a6c6017230301cf4daa783b04fcc13d5
  CANARY_REF: b15b7d544f4795e3a2a65b88de35391b9fd0a20d
  OTCLIENT_REF: 9189d1063e968a0c2ffab11c5069db192e753397
  CANARY_HARNESS_REF: f46ae126557d4d26043c77fe17968b72fd5bc688
  SOURCE_BUILD_RUN: "30087461815"
  GATEWAY_BUILD_RUN: "30047343772"
  CANARY_BUILD_RUN: "30080248772"
  GATEWAY_ARTIFACT_ID: "8579664843"
  GATEWAY_ARTIFACT_DIGEST: sha256:56909f84aad1c7d58e8ccd52021aa6899fdcd19049c68e634e62384e76f4d142
  CANARY_ARTIFACT_ID: "8591665710"
  CANARY_ARTIFACT_DIGEST: sha256:6b0e13966047c571de2c7a3f948f0f9b54b1619800c4b591cd70adf5a7a860f1
  OTCLIENT_ARTIFACT_ID: "8595332324"
  OTCLIENT_ARTIFACT_DIGEST: sha256:396e0e1fed38c14f43c88cba4e578997ecbd56c2f211ee8b398c712a10c44850
  OTCLIENT_BINARY_SHA256: 9c95ca6e3c26b387f61fcaeb99596d877c1db1bd85a8df1dac310f4a9af03c22

jobs:
  rehearsal:
    name: Full ephemeral production-like native-auth cutover
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout validation runner head
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout exact Platform runtime source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PLATFORM_REF }}
          path: platform-source
          persist-credentials: false

      - name: Checkout exact Canary runtime source
        uses: actions/checkout@v6
        with:
          repository: blakinio/canary
          ref: ${{ env.CANARY_REF }}
          path: canary-runtime-source
          persist-credentials: false

      - name: Checkout exact OTClient runtime source
        uses: actions/checkout@v6
        with:
          repository: blakinio/otclient
          ref: ${{ env.OTCLIENT_REF }}
          path: otclient-source
          persist-credentials: false

      - name: Checkout exact Canary rehearsal harness
        uses: actions/checkout@v6
        with:
          repository: blakinio/canary
          ref: ${{ env.CANARY_HARNESS_REF }}
          path: canary-harness
          persist-credentials: false

      - name: Checkout matching Tibia client assets
        uses: actions/checkout@v6
        with:
          repository: dudantas/tibia-client
          path: tibia-client-assets
          lfs: true
          persist-credentials: false

      - name: Reuse exact Gateway build artifact
        uses: actions/download-artifact@v4
        with:
          name: native-auth-rehearsal-gateway
          path: gateway-artifact
          github-token: ${{ github.token }}
          repository: blakinio/Oteryn-Platform
          run-id: ${{ env.GATEWAY_BUILD_RUN }}

      - name: Reuse exact Canary build artifact
        uses: actions/download-artifact@v4
        with:
          name: native-auth-rehearsal-canary-cache-headers
          path: canary-artifact
          github-token: ${{ github.token }}
          repository: blakinio/Oteryn-Platform
          run-id: ${{ env.CANARY_BUILD_RUN }}

      - name: Reuse exact fixed OTClient release artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-linux-release
          path: otclient-artifact
          github-token: ${{ github.token }}
          repository: blakinio/otclient
          run-id: ${{ env.SOURCE_BUILD_RUN }}

      - name: Verify all declared exact revisions and artifact payloads
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git -C platform-source rev-parse HEAD)" = "${PLATFORM_REF}"
          test "$(git -C canary-runtime-source rev-parse HEAD)" = "${CANARY_REF}"
          test "$(git -C otclient-source rev-parse HEAD)" = "${OTCLIENT_REF}"
          test "$(git -C canary-harness rev-parse HEAD)" = "${CANARY_HARNESS_REF}"
          test "$(tr -d '\r\n' < gateway-artifact/gateway-commit.txt)" = "${GATEWAY_REF}"
          test "$(tr -d '\r\n' < canary-artifact/canary-commit.txt)" = "${CANARY_REF}"
          (cd gateway-artifact && sha256sum --check gateway-build-sha256.txt)
          (cd canary-artifact && sha256sum --check canary-build-sha256.txt)
          test -f otclient-artifact/otclient
          printf '%s  %s\n' "${OTCLIENT_BINARY_SHA256}" otclient-artifact/otclient | sha256sum --check -

          metadata="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/blakinio/otclient/actions/artifacts/${OTCLIENT_ARTIFACT_ID}")"
          test "$(jq -r '.id' <<<"${metadata}")" = "${OTCLIENT_ARTIFACT_ID}"
          test "$(jq -r '.name' <<<"${metadata}")" = "linux-linux-release"
          test "$(jq -r '.digest' <<<"${metadata}")" = "${OTCLIENT_ARTIFACT_DIGEST}"
          test "$(jq -r '.workflow_run.id' <<<"${metadata}")" = "${SOURCE_BUILD_RUN}"
          test "$(jq -r '.workflow_run.head_sha' <<<"${metadata}")" = "${OTCLIENT_REF}"
          test "$(jq -r '.expired' <<<"${metadata}")" = "false"

      - name: Resolve executable artifacts
        run: |
          set -euo pipefail
          mv otclient-artifact/otclient otclient-artifact/otclient-rehearsal
          chmod +x gateway-artifact/game-gateway canary-artifact/canary-rehearsal otclient-artifact/otclient-rehearsal
          echo "REHEARSAL_GATEWAY_BIN=${GITHUB_WORKSPACE}/gateway-artifact/game-gateway" >> "${GITHUB_ENV}"
          echo "REHEARSAL_CANARY_BIN=${GITHUB_WORKSPACE}/canary-artifact/canary-rehearsal" >> "${GITHUB_ENV}"
          echo "REHEARSAL_OTCLIENT_BIN=${GITHUB_WORKSPACE}/otclient-artifact/otclient-rehearsal" >> "${GITHUB_ENV}"

      - name: Validate exact harness and runner syntax
        run: |
          set -euo pipefail
          python3 -m py_compile \
            tests/e2e/native_auth_ephemeral_cutover/acceptance_extensions.py \
            tests/e2e/native_auth_ephemeral_cutover/exact_runner.py \
            tests/e2e/native_auth_ephemeral_cutover/platform_runner.py \
            canary-harness/tests/e2e/native_auth_ephemeral_cutover/run_rehearsal.py \
            canary-harness/tests/e2e/native_auth_ephemeral_cutover/browser_driver.py \
            canary-harness/tests/e2e/native_auth_ephemeral_cutover/oauth_probe.py
          bash -n canary-harness/tests/e2e/native_auth_ephemeral_cutover/capture-xdg-open.sh
          test -s canary-harness/tests/e2e/native_auth_ephemeral_cutover/otclient_session_negative_e2e.lua
          test -s canary-harness/tests/e2e/native_auth_ephemeral_cutover/otclient_malformed_gateway_e2e.lua

      - name: Run full ephemeral cutover rehearsal
        env:
          REHEARSAL_CANARY_HARNESS_ROOT: ${{ github.workspace }}/canary-harness/tests/e2e/native_auth_ephemeral_cutover
          REHEARSAL_HARNESS_ROOT: ${{ github.workspace }}/canary-harness/tests/e2e/native_auth_ephemeral_cutover
          REHEARSAL_PLATFORM_SOURCE: ${{ github.workspace }}/platform-source
          REHEARSAL_CANARY_SOURCE: ${{ github.workspace }}/canary-runtime-source
          REHEARSAL_OTCLIENT_SOURCE: ${{ github.workspace }}/otclient-source
          REHEARSAL_ASSETS_SOURCE: ${{ github.workspace }}/tibia-client-assets/assets
          REHEARSAL_CANARY_BIN: ${{ env.REHEARSAL_CANARY_BIN }}
          REHEARSAL_GATEWAY_BIN: ${{ env.REHEARSAL_GATEWAY_BIN }}
          REHEARSAL_OTCLIENT_BIN: ${{ env.REHEARSAL_OTCLIENT_BIN }}
          REHEARSAL_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/native-auth-ephemeral-cutover
          REHEARSAL_SOURCE_BUILD_RUN: ${{ env.SOURCE_BUILD_RUN }}
          REHEARSAL_CANARY_BUILD_RUN: ${{ env.CANARY_BUILD_RUN }}
          REHEARSAL_GATEWAY_ARTIFACT_ID: ${{ env.GATEWAY_ARTIFACT_ID }}
          REHEARSAL_GATEWAY_ARTIFACT_DIGEST: ${{ env.GATEWAY_ARTIFACT_DIGEST }}
          REHEARSAL_CANARY_ARTIFACT_ID: ${{ env.CANARY_ARTIFACT_ID }}
          REHEARSAL_CANARY_ARTIFACT_DIGEST: ${{ env.CANARY_ARTIFACT_DIGEST }}
          REHEARSAL_OTCLIENT_ARTIFACT_ID: ${{ env.OTCLIENT_ARTIFACT_ID }}
          REHEARSAL_OTCLIENT_ARTIFACT_DIGEST: ${{ env.OTCLIENT_ARTIFACT_DIGEST }}
        run: |
          set -euo pipefail
          mkdir -p "${REHEARSAL_EVIDENCE_DIR}"
          python3 tests/e2e/native_auth_ephemeral_cutover/exact_runner.py

      - name: Normalize split Gateway and OTClient provenance
        if: always()
        env:
          REHEARSAL_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/native-auth-ephemeral-cutover
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["REHEARSAL_EVIDENCE_DIR"])
          revisions_path = root / "runtime-revisions.json"
          digests_path = root / "artifact-digests.json"

          if revisions_path.exists():
              revisions = json.loads(revisions_path.read_text(encoding="utf-8"))
              build = revisions.setdefault("build", {})
              build.pop("gateway_otclient_source_build_run", None)
              build["gateway_source_build_run"] = os.environ["GATEWAY_BUILD_RUN"]
              build["otclient_source_build_run"] = os.environ["SOURCE_BUILD_RUN"]
              revisions_path.write_text(json.dumps(revisions, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          if digests_path.exists():
              digests = json.loads(digests_path.read_text(encoding="utf-8"))
              digests.pop("gateway_otclient_source_build_run", None)
              digests["gateway_source_build_run"] = int(os.environ["GATEWAY_BUILD_RUN"])
              digests["otclient_source_build_run"] = int(os.environ["SOURCE_BUILD_RUN"])
              digests_path.write_text(json.dumps(digests, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Assert retained result classification and extended matrix
        if: success()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("artifacts/native-auth-ephemeral-cutover")
          result = json.loads((root / "result.json").read_text())
          runtime = json.loads((root / "native-auth-runtime.json").read_text())
          failure = json.loads((root / "failure-injection-summary.json").read_text())
          cache = json.loads((root / "cache-header-validation.json").read_text())
          correlation = json.loads((root / "request-correlation.json").read_text())
          scan = json.loads((root / "sensitive-log-scan.json").read_text())
          revisions = json.loads((root / "runtime-revisions.json").read_text())
          digests = json.loads((root / "artifact-digests.json").read_text())

          assert result["overall_status"] == "PRODUCTION_LIKE_PROVEN", result
          assert result["evidence_classification"] == "PRODUCTION_LIKE_PROVEN", result
          assert result["successful_world_entries"] == 1, result
          assert result["replay_rejection_status"] is True, result
          assert result["logout_status"] is True, result
          assert result["credential_rotation_status"] is True, result
          assert result["tls_validation_status"] is True, result
          assert result["rollback_status"] is True, result
          assert result["sensitive_log_scan_status"] == "PASS", result
          assert result["failure_injection_status"] == "PASS", result

          assert cache["status"] == "PASS", cache
          assert cache["canary_issuer_success"] is True, cache
          assert cache["gateway_login_success"] is True, cache
          assert cache["normal_happy_path_no_5xx"] is True, cache
          assert correlation["status"] == "PASS", correlation
          assert scan["status"] == "PASS", scan
          assert scan["jwt_pattern_scanned"] is True, scan

          assert runtime["physical_random_invalid_game_session"] == "PASS", runtime
          assert runtime["physical_unauthorized_character_burn"] == "PASS", runtime
          assert runtime["canary_restart_invalidated_process_local_session"] is True, runtime
          assert runtime["canary_restart_service_recovered"] is True, runtime
          assert runtime["request_correlation"] == "PASS", runtime
          assert runtime["cache_header_validation"] == "PASS", runtime
          assert runtime["normal_happy_path_no_5xx"] is True, runtime

          for key in [
              "private_gateway_to_canary_path_blocked_fail_closed",
              "private_gateway_to_canary_path_recovery",
              "client_controlled_account_override_rejected",
              "account_override_response_cache_headers",
              "malformed_canary_session_response_fail_closed",
              "malformed_canary_request_reached_private_boundary",
              "physical_otclient_malformed_gateway_fail_closed",
          ]:
              assert failure[key] is True, (key, failure)

          for event_file in [
              "random-invalid-session-events.tsv",
              "unauthorized-character-burn-events.tsv",
              "restart-invalidated-session-events.tsv",
              "malformed-gateway-client-events.tsv",
              "client-events.tsv",
          ]:
              path = root / event_file
              assert path.is_file() and path.stat().st_size > 0, event_file

          assert revisions["components"]["platform"]["source_sha"] == "b5dd6a7be5c704d5706241240e06f8bb8c4b5efe", revisions
          assert revisions["components"]["gateway"]["source_sha"] == "53158217a6c6017230301cf4daa783b04fcc13d5", revisions
          assert revisions["components"]["canary"]["source_sha"] == "b15b7d544f4795e3a2a65b88de35391b9fd0a20d", revisions
          assert revisions["components"]["otclient"]["source_sha"] == "9189d1063e968a0c2ffab11c5069db192e753397", revisions
          assert revisions["components"]["canary_harness"]["source_sha"] == "f46ae126557d4d26043c77fe17968b72fd5bc688", revisions
          assert revisions["build"]["gateway_source_build_run"] == "30047343772", revisions
          assert revisions["build"]["otclient_source_build_run"] == "30087461815", revisions
          assert digests["canary_source_build_artifact_id"] == 8591665710, digests
          assert digests["gateway_source_build_artifact_id"] == 8579664843, digests
          assert digests["otclient_source_build_artifact_id"] == 8595332324, digests
          assert digests["gateway_source_build_run"] == 30047343772, digests
          assert digests["otclient_source_build_run"] == 30087461815, digests
          PY

      - name: Upload sanitized rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-auth-ephemeral-cutover-evidence
          path: artifacts/native-auth-ephemeral-cutover/
          if-no-files-found: warn
          retention-days: 30

  required:
    name: Required native-auth ephemeral cutover rehearsal
    if: always()
    needs: [rehearsal]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Enforce rehearsal result
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          jobs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: data.get("result") for name, data in jobs.items() if data.get("result") != "success"}
          if failed:
              raise SystemExit(f"native-auth ephemeral cutover did not pass: {failed}")
          PY
