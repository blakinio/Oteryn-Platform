name: One-shot Synology LAN Game Deploy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-synology-lan-game-deploy.yml
      - .github/workflows/deploy-synology-staging.yml
      - deploy/synology/**
      - app/Console/Commands/EnsureGameWorld.php

permissions:
  actions: write
  contents: read
  packages: read

concurrency:
  group: synology-staging-lan-game-one-shot
  cancel-in-progress: false

jobs:
  dispatch:
    if: contains(github.event.head_commit.message, '[synology-lan-game]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for exact Platform and Gateway images
        run: |
          set -euo pipefail
          release_tag="sha-${GITHUB_SHA}"

          wait_for_image() {
            local image="$1"
            for attempt in $(seq 1 180); do
              if docker manifest inspect "$image" >/dev/null 2>&1; then
                echo "Resolved image: $image"
                return 0
              fi
              echo "Waiting for $image (attempt $attempt/180)"
              sleep 10
            done
            echo "Timed out waiting for image: $image" >&2
            return 1
          }

          wait_for_image "ghcr.io/blakinio/oteryn-platform:${release_tag}"
          wait_for_image "ghcr.io/blakinio/oteryn-game-gateway:${release_tag}"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Dispatch guarded LAN-only Synology deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANARY_IMAGE_DIGEST: ghcr.io/blakinio/canary@sha256:784e5dbdcc64e311c48c51cd94aa206e2efa1e5eefb2f4ef40170d5aac55031f
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-synology-staging.yml/dispatches" \
            -f ref=main \
            -f 'inputs[action]=deploy' \
            -f "inputs[release_tag]=${RELEASE_TAG}" \
            -f "inputs[canary_image]=${CANARY_IMAGE_DIGEST}" \
            -f 'inputs[canary_game_bind_address]=192.168.1.2' \
            -f 'inputs[game_world_id]=1' \
            -f 'inputs[game_world_slug]=oteryn-staging' \
            -f 'inputs[game_world_name]=Oteryn Staging' \
            -f 'inputs[game_world_region]=LAN'
          echo "DEPLOY_DISPATCHED_AT=$dispatched_at" >> "$GITHUB_ENV"

      - name: Locate and monitor deployment run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          deploy_run_id=""
          for attempt in $(seq 1 60); do
            deploy_run_id="$(
              gh api \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-synology-staging.yml/runs?event=workflow_dispatch&branch=main&per_page=20" \
                --jq ".workflow_runs | map(select(.created_at >= \"${DEPLOY_DISPATCHED_AT}\")) | sort_by(.created_at) | last | .id // empty"
            )"
            if [[ -n "$deploy_run_id" ]]; then
              break
            fi
            echo "Waiting for Deploy Synology Staging run registration (attempt $attempt/60)"
            sleep 5
          done

          if [[ -z "$deploy_run_id" ]]; then
            echo "The deployment dispatch was accepted but no matching workflow run appeared." >&2
            exit 1
          fi

          echo "Monitoring Deploy Synology Staging run ${deploy_run_id}."
          gh run watch "$deploy_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --exit-status \
            --interval 10

      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io >/dev/null 2>&1 || true
