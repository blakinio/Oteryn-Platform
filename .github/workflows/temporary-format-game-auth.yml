name: Temporary Game Auth Formatter

on:
  push:
    branches:
      - task/OTERYN-20260722-game-ticket-http-boundary

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: task/OTERYN-20260722-game-ticket-http-boundary
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Format PHP
        run: composer format

      - name: Commit formatted sources and remove temporary workflow
        run: |
          rm .github/workflows/temporary-format-game-auth.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "style(auth): apply repository formatting"
            git push origin HEAD:task/OTERYN-20260722-game-ticket-http-boundary
          fi
