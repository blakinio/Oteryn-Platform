name: Diagnose PHPStan

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-phpstan.yml"
      - "tests/Feature/Security/TrustedProxySchemeTest.php"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run and retain PHPStan output
        id: analyse
        shell: bash
        run: |
          set +e
          composer analyse > phpstan-output.txt 2>&1
          status=$?
          cat phpstan-output.txt
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phpstan-output
          path: phpstan-output.txt
          if-no-files-found: error
          retention-days: 1
      - name: Preserve failing conclusion
        run: test "${{ steps.analyse.outputs.status }}" = "0"
