name: Inspect Synology Canary Failure

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-synology-canary-failure.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect-actions-log:
    runs-on: ubuntu-latest
    steps:
      - name: Extract sanitized deployment failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=89459153834
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}" \
            --jq '{id,name,status,conclusion,runner_name,runner_group_name,labels,steps:[.steps[]|{number,name,status,conclusion}]}'
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > /tmp/deploy.log
          python3 - <<'PY'
          import re
          from pathlib import Path

          ansi = re.compile(r'\x1b\[[0-9;]*m')
          patterns = re.compile(
              r'(Process completed with exit code|Error response from daemon|'
              r'failed|failure|error|denied|unauthorized|not found|no such|unhealthy|'
              r'did not become ready|refusing|mismatch|unable|cannot|connection refused|'
              r'timed out|timeout|manifest unknown|pull access denied|permission denied|'
              r'dependency failed|service .* failed)',
              re.IGNORECASE,
          )
          secretish = re.compile(r'(?<![A-Za-z0-9])[A-Za-z0-9+/=_-]{24,}(?![A-Za-z0-9])')
          matches = []
          for raw in Path('/tmp/deploy.log').read_text(errors='replace').splitlines():
              line = ansi.sub('', raw)
              if '[36;1m' in raw:
                  continue
              if patterns.search(line):
                  matches.append(secretish.sub('<redacted>', line))
          if not matches:
              raise SystemExit('No sanitized failure lines found.')
          for line in matches[-160:]:
              print(line)
          PY

  inspect-canary-runner-state:
    runs-on: oteryn-staging
    steps:
      - name: Inspect sanitized Canary state and logs
        run: |
          set -euo pipefail
          cid="$(docker ps -aq \
            --filter label=com.docker.compose.project=oteryn-staging \
            --filter label=com.docker.compose.service=canary \
            | head -n 1)"
          if [[ -z "$cid" ]]; then
            echo 'No oteryn-staging Canary container exists.'
            exit 1
          fi
          docker inspect --format \
            'status={{.State.Status}} running={{.State.Running}} exit_code={{.State.ExitCode}} oom_killed={{.State.OOMKilled}} error={{printf "%q" .State.Error}} started_at={{.State.StartedAt}} finished_at={{.State.FinishedAt}} restart_count={{.RestartCount}} image={{.Config.Image}}' \
            "$cid"
          docker inspect --format 'network_mode={{.HostConfig.NetworkMode}}' "$cid"
          docker logs --tail 300 "$cid" 2>&1 > /tmp/canary.log || true
          python3 - <<'PY'
          import re
          from pathlib import Path

          secretish = re.compile(r'(?<![A-Za-z0-9])[A-Za-z0-9+/=_-]{24,}(?![A-Za-z0-9])')
          text = Path('/tmp/canary.log').read_text(errors='replace')
          if not text.strip():
              print('Canary container has no logs.')
          else:
              for raw in text.splitlines():
                  print(secretish.sub('<redacted>', raw))
          PY
