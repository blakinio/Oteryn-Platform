name: Inspect Synology Canary Failure

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-synology-canary-failure.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect-actions-log:
    runs-on: ubuntu-latest
    steps:
      - name: Extract sanitized deployment failure
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=89459153834
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}" \
            --jq '{id,name,status,conclusion,runner_name,runner_group_name,labels,steps:[.steps[]|{number,name,status,conclusion}]}'
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > /tmp/deploy.log
          python3 - <<'PY'
          import re
          from pathlib import Path

          ansi = re.compile(r'\x1b\[[0-9;]*m')
          patterns = re.compile(
              r'(Process completed with exit code|Error response from daemon|'
              r'failed|failure|error|denied|unauthorized|not found|no such|unhealthy|'
              r'did not become ready|refusing|mismatch|unable|cannot|connection refused|'
              r'timed out|timeout|manifest unknown|pull access denied|permission denied|'
              r'dependency failed|service .* failed)',
              re.IGNORECASE,
          )
          secretish = re.compile(r'(?<![A-Za-z0-9])[A-Za-z0-9+/=_-]{24,}(?![A-Za-z0-9])')
          matches = []
          for raw in Path('/tmp/deploy.log').read_text(errors='replace').splitlines():
              line = ansi.sub('', raw)
              if '[36;1m' in raw:
                  continue
              if patterns.search(line):
                  matches.append(secretish.sub('<redacted>', line))
          if not matches:
              raise SystemExit('No sanitized failure lines found.')
          for line in matches[-160:]:
              print(line)
          PY

  inspect-canary-runner-state:
    runs-on: oteryn-staging
    steps:
      - name: Inspect sanitized Canary and schema state
        run: |
          set -euo pipefail
          canary_cid="$(docker ps -aq \
            --filter label=com.docker.compose.project=oteryn-staging \
            --filter label=com.docker.compose.service=canary \
            | head -n 1)"
          mariadb_cid="$(docker ps -q \
            --filter label=com.docker.compose.project=oteryn-staging \
            --filter label=com.docker.compose.service=mariadb \
            | head -n 1)"
          if [[ -z "$canary_cid" || -z "$mariadb_cid" ]]; then
            echo 'Required oteryn-staging Canary or MariaDB container is missing.'
            exit 1
          fi

          docker inspect --format \
            'canary_status={{.State.Status}} running={{.State.Running}} exit_code={{.State.ExitCode}} oom_killed={{.State.OOMKilled}} error={{printf "%q" .State.Error}} started_at={{.State.StartedAt}} finished_at={{.State.FinishedAt}} restart_count={{.RestartCount}} image={{.Config.Image}}' \
            "$canary_cid"
          docker inspect --format 'canary_network_mode={{.HostConfig.NetworkMode}}' "$canary_cid"

          echo '--- canary schema summary ---'
          docker exec -i "$mariadb_cid" sh -ec 'exec mariadb -uroot -p"$MARIADB_ROOT_PASSWORD" -N' <<'SQL'
          SELECT CONCAT('total_tables=', COUNT(*)) FROM information_schema.tables WHERE table_schema='canary';
          SELECT CONCAT('required_table=', table_name) FROM information_schema.tables WHERE table_schema='canary' AND table_name IN ('accounts','players','guilds','guild_membership','guild_ranks','channels','cluster_sessions') ORDER BY table_name;
          SQL

          docker logs --tail 800 "$canary_cid" 2>&1 > /tmp/canary.log || true
          python3 - <<'PY'
          import re
          from pathlib import Path

          secretish = re.compile(r'(?<![A-Za-z0-9])[A-Za-z0-9+/=_-]{24,}(?![A-Za-z0-9])')
          interesting = re.compile(r'(error|fatal|exception|failed|failure|shutdown|restart|terminated|segmentation|killed|unable|cannot)', re.IGNORECASE)
          lines = Path('/tmp/canary.log').read_text(errors='replace').splitlines()
          selected = [line for line in lines if interesting.search(line)]
          print('--- sanitized Canary error/lifecycle lines ---')
          if selected:
              for raw in selected[-160:]:
                  print(secretish.sub('<redacted>', raw))
          else:
              print('No matching Canary error/lifecycle lines.')
          print('--- sanitized Canary log tail ---')
          for raw in lines[-40:]:
              print(secretish.sub('<redacted>', raw))
          PY
