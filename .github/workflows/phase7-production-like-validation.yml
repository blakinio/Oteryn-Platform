name: Phase 7 Production-Like Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase7-production-like-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: phase7-ci-root-not-a-secret
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025
    env:
      VALIDATION_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://staging.oteryn.internal
      LOG_CHANNEL: stderr_json
      LOG_LEVEL: info
      SESSION_SECURE_COOKIE: "true"
      SESSION_HTTP_ONLY: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: ""
      MAIL_FROM_ADDRESS: phase7@staging.oteryn
      MAIL_FROM_NAME: Oteryn Phase 7
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: oteryn_platform
      DB_USERNAME: root
      DB_PASSWORD: phase7-ci-root-not-a-secret
      CANARY_DB_HOST: 127.0.0.1
      CANARY_DB_PORT: 3306
      CANARY_DB_DATABASE: canary
      CANARY_DB_USERNAME: oteryn_readonly
      CANARY_DB_PASSWORD: phase7-ci-readonly-not-a-secret
      CANARY_PROVISIONING_DB_HOST: 127.0.0.1
      CANARY_PROVISIONING_DB_PORT: 3306
      CANARY_PROVISIONING_DB_DATABASE: canary
      CANARY_PROVISIONING_DB_USERNAME: oteryn_provisioning
      CANARY_PROVISIONING_DB_PASSWORD: phase7-ci-provisioning-not-a-secret
      CANARY_CHARACTER_CREATE_DB_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_DB_PORT: 3306
      CANARY_CHARACTER_CREATE_DB_DATABASE: canary
      CANARY_CHARACTER_CREATE_DB_USERNAME: oteryn_character_create
      CANARY_CHARACTER_CREATE_DB_PASSWORD: phase7-ci-character-not-a-secret
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: phase7-ci-root-not-a-secret
      CANARY_CHARACTER_CREATE_INTEGRATION_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_INTEGRATION_PORT: 3306
      CANARY_CHARACTER_CREATE_INTEGRATION_ROOT_PASSWORD: phase7-ci-root-not-a-secret
      CANARY_RUNTIME_REDIS_CLIENT: phpredis
      CANARY_RUNTIME_REDIS_SCHEME: tcp
      CANARY_RUNTIME_REDIS_HOST: 127.0.0.1
      CANARY_RUNTIME_REDIS_PORT: 6379
      CANARY_RUNTIME_REDIS_DB: 0
      CANARY_RUNTIME_REDIS_USERNAME: oteryn_runtime
      CANARY_RUNTIME_REDIS_PASSWORD: phase7-ci-runtime-not-a-secret
      MARIADB_ROOT_PASSWORD: phase7-ci-root-not-a-secret

    steps:
      - name: Checkout exact validation SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl, redis
          tools: composer:v2

      - name: Install validation clients
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mariadb-client redis-tools

      - name: Install development dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate ephemeral application key
        run: echo "APP_KEY=$(php -r 'echo "base64:".base64_encode(random_bytes(32));')" >> "$GITHUB_ENV"

      - name: Resolve previous known-good SHA
        run: |
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse "${VALIDATION_SHA}^")"
            echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          fi
          git cat-file -e "${VALIDATION_SHA}^{commit}"
          git cat-file -e "${BASE_SHA}^{commit}"
          echo "Validation SHA: ${VALIDATION_SHA}"
          echo "Previous known-good SHA: ${BASE_SHA}"

      - name: Provision production-like MariaDB schemas and principals
        run: |
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" <<'SQL'
          CREATE DATABASE IF NOT EXISTS oteryn_platform CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE DATABASE IF NOT EXISTS canary CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

          CREATE TABLE IF NOT EXISTS canary.accounts (
              id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              password VARCHAR(255) NOT NULL,
              email VARCHAR(255) NOT NULL,
              creation BIGINT NOT NULL DEFAULT 0
          );

          CREATE TABLE IF NOT EXISTS canary.players (
              id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              group_id BIGINT NOT NULL DEFAULT 1,
              account_id BIGINT UNSIGNED NOT NULL,
              level BIGINT NOT NULL DEFAULT 1,
              vocation BIGINT NOT NULL DEFAULT 0,
              health BIGINT NOT NULL DEFAULT 100,
              healthmax BIGINT NOT NULL DEFAULT 100,
              experience BIGINT NOT NULL DEFAULT 0,
              lookbody BIGINT NOT NULL DEFAULT 0,
              lookfeet BIGINT NOT NULL DEFAULT 0,
              lookhead BIGINT NOT NULL DEFAULT 0,
              looklegs BIGINT NOT NULL DEFAULT 0,
              looktype BIGINT NOT NULL DEFAULT 0,
              lookaddons BIGINT NOT NULL DEFAULT 0,
              maglevel BIGINT NOT NULL DEFAULT 0,
              mana BIGINT NOT NULL DEFAULT 0,
              manamax BIGINT NOT NULL DEFAULT 0,
              manaspent BIGINT NOT NULL DEFAULT 0,
              soul BIGINT NOT NULL DEFAULT 0,
              town_id BIGINT NOT NULL DEFAULT 1,
              posx BIGINT NOT NULL DEFAULT 0,
              posy BIGINT NOT NULL DEFAULT 0,
              posz BIGINT NOT NULL DEFAULT 0,
              conditions BLOB NULL,
              cap BIGINT NOT NULL DEFAULT 0,
              sex BIGINT NOT NULL DEFAULT 0,
              pronoun BIGINT NOT NULL DEFAULT 0,
              istutorial BIGINT NOT NULL DEFAULT 0,
              skill_fist BIGINT NOT NULL DEFAULT 10,
              skill_fist_tries BIGINT NOT NULL DEFAULT 0,
              skill_club BIGINT NOT NULL DEFAULT 10,
              skill_club_tries BIGINT NOT NULL DEFAULT 0,
              skill_sword BIGINT NOT NULL DEFAULT 10,
              skill_sword_tries BIGINT NOT NULL DEFAULT 0,
              skill_axe BIGINT NOT NULL DEFAULT 10,
              skill_axe_tries BIGINT NOT NULL DEFAULT 0,
              skill_dist BIGINT NOT NULL DEFAULT 10,
              skill_dist_tries BIGINT NOT NULL DEFAULT 0,
              skill_shielding BIGINT NOT NULL DEFAULT 10,
              skill_shielding_tries BIGINT NOT NULL DEFAULT 0,
              skill_fishing BIGINT NOT NULL DEFAULT 10,
              skill_fishing_tries BIGINT NOT NULL DEFAULT 0,
              deletion BIGINT NOT NULL DEFAULT 0
          );

          CREATE TABLE IF NOT EXISTS canary.guilds (id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY);
          CREATE TABLE IF NOT EXISTS canary.guild_membership (id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY);
          CREATE TABLE IF NOT EXISTS canary.guild_ranks (id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY);
          CREATE TABLE IF NOT EXISTS canary.channels (id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY);
          CREATE TABLE IF NOT EXISTS canary.cluster_sessions (id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY);
          SQL

          sed \
            -e 's|{{OTERYN_CANARY_DB_USER}}|oteryn_readonly|g' \
            -e 's|{{OTERYN_CANARY_DB_HOST}}|%|g' \
            -e 's|{{OTERYN_CANARY_DB_PASSWORD}}|phase7-ci-readonly-not-a-secret|g' \
            -e 's|{{CANARY_DB_NAME}}|canary|g' \
            database/provisioning/canary-readonly.sql.template \
            | mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"

          sed \
            -e 's|{{OTERYN_CANARY_PROVISIONING_DB_USER}}|oteryn_provisioning|g' \
            -e 's|{{OTERYN_CANARY_PROVISIONING_DB_HOST}}|%|g' \
            -e 's|{{OTERYN_CANARY_PROVISIONING_DB_PASSWORD}}|phase7-ci-provisioning-not-a-secret|g' \
            -e 's|{{CANARY_DB_NAME}}|canary|g' \
            database/provisioning/canary-provisioning.sql.template \
            | mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"

          sed \
            -e 's|{{OTERYN_CANARY_CHARACTER_CREATE_DB_USER}}|oteryn_character_create|g' \
            -e 's|{{OTERYN_CANARY_CHARACTER_CREATE_DB_HOST}}|%|g' \
            -e 's|{{OTERYN_CANARY_CHARACTER_CREATE_DB_PASSWORD}}|phase7-ci-character-not-a-secret|g' \
            -e 's|{{CANARY_DB_NAME}}|canary|g' \
            database/provisioning/canary-character-create.sql.template \
            | mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD"

      - name: Provision runtime Redis ACL principal
        run: |
          redis-cli ACL SETUSER oteryn_runtime on '>phase7-ci-runtime-not-a-secret' resetkeys '~cluster:channel:*:runtime' -@all +hmget +pttl +ping +select
          redis-cli HSET cluster:channel:1:runtime channel_id 1 status ONLINE players_online 3
          redis-cli PEXPIRE cluster:channel:1:runtime 600000

      - name: Validate clean current-SHA deployment and migrations
        run: |
          mkdir -p "/tmp/phase7-releases/${VALIDATION_SHA}"
          git archive "$VALIDATION_SHA" | tar -x -C "/tmp/phase7-releases/${VALIDATION_SHA}"
          (
            cd "/tmp/phase7-releases/${VALIDATION_SHA}"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
            php artisan production:verify-configuration
            php artisan migrate --force --no-interaction
          )
          ln -sfn "/tmp/phase7-releases/${VALIDATION_SHA}" /tmp/phase7-current
          test "$(readlink -f /tmp/phase7-current)" = "/tmp/phase7-releases/${VALIDATION_SHA}"

      - name: Validate effective database privilege boundaries
        run: |
          php artisan production:verify-configuration
          php artisan canary:verify-db-privileges
          php artisan canary:verify-provisioning-db-privileges
          php artisan canary:verify-character-create-db-privileges

          if mariadb --protocol=tcp -h127.0.0.1 -uoteryn_readonly -p"$CANARY_DB_PASSWORD" canary -e "UPDATE players SET name = name WHERE 1 = 0"; then
            echo "Read-only Canary principal unexpectedly accepted UPDATE."
            exit 1
          fi

          if mariadb --protocol=tcp -h127.0.0.1 -uoteryn_provisioning -p"$CANARY_PROVISIONING_DB_PASSWORD" canary -e "INSERT INTO players (name, account_id) VALUES ('forbidden', 1)"; then
            echo "Provisioning principal unexpectedly wrote to players."
            exit 1
          fi

          if mariadb --protocol=tcp -h127.0.0.1 -uoteryn_character_create -p"$CANARY_CHARACTER_CREATE_DB_PASSWORD" canary -e "UPDATE accounts SET name = name WHERE 1 = 0"; then
            echo "Character-create principal unexpectedly accepted accounts UPDATE."
            exit 1
          fi

      - name: Validate database privilege fail-closed scenarios
        run: |
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "GRANT UPDATE ON canary.players TO 'oteryn_readonly'@'%';"
          if php artisan canary:verify-db-privileges; then
            echo "Verifier unexpectedly accepted excessive read principal privileges."
            exit 1
          fi
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "REVOKE UPDATE ON canary.players FROM 'oteryn_readonly'@'%';"
          php artisan canary:verify-db-privileges

          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "REVOKE SELECT (creation) ON canary.accounts FROM 'oteryn_provisioning'@'%';"
          if php artisan canary:verify-provisioning-db-privileges; then
            echo "Verifier unexpectedly accepted insufficient provisioning privileges."
            exit 1
          fi
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "GRANT SELECT (creation) ON canary.accounts TO 'oteryn_provisioning'@'%';"
          php artisan canary:verify-provisioning-db-privileges

          if CANARY_DB_PORT=3307 php artisan canary:verify-db-privileges; then
            echo "Verifier unexpectedly succeeded with unavailable Canary DB endpoint."
            exit 1
          fi

      - name: Validate runtime Redis ACL and failure semantics
        run: |
          php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          $status = $app->make(App\CanaryIntegration\CanaryRuntimeRedisReader::class)->read(1);
          if ($status === null || $status->channelId !== 1 || $status->playersOnline !== 3 || $status->status !== "ONLINE") { exit(1); }
          '

          WRITE_RESULT="$(redis-cli --user oteryn_runtime -a "$CANARY_RUNTIME_REDIS_PASSWORD" SET cluster:channel:1:runtime forbidden 2>&1 || true)"
          echo "$WRITE_RESULT" | grep -q 'NOPERM'

          redis-cli DEL cluster:channel:1:runtime
          php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          if ($app->make(App\CanaryIntegration\CanaryRuntimeRedisReader::class)->read(1) !== null) { exit(1); }
          '

          redis-cli HSET cluster:channel:1:runtime channel_id 1 status INVALID players_online 3
          redis-cli PEXPIRE cluster:channel:1:runtime 600000
          php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          try {
              $app->make(App\CanaryIntegration\CanaryRuntimeRedisReader::class)->read(1);
              exit(1);
          } catch (UnexpectedValueException) {
              exit(0);
          }
          '

          if CANARY_RUNTIME_REDIS_PORT=6399 php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          try {
              $app->make(App\CanaryIntegration\CanaryRuntimeRedisReader::class)->read(1);
              exit(0);
          } catch (Throwable) {
              exit(1);
          }
          '; then
            echo "Runtime Redis reader unexpectedly succeeded against unavailable dependency."
            exit 1
          fi

      - name: Validate SMTP delivery and mail failure behavior
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8025/api/v2/messages >/dev/null; then
              break
            fi
            sleep 1
          done

          php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          Illuminate\Support\Facades\Mail::raw("Phase 7 production-like delivery probe", function ($message): void {
              $message->to("phase7-probe@staging.oteryn")->subject("Oteryn Phase 7 delivery probe");
          });
          '
          curl -fsS http://127.0.0.1:8025/api/v2/messages | grep -q 'Oteryn Phase 7 delivery probe'

          if MAIL_PORT=1026 php -r '
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
          try {
              Illuminate\Support\Facades\Mail::raw("failure probe", function ($message): void {
                  $message->to("phase7-probe@staging.oteryn")->subject("failure probe");
              });
              exit(0);
          } catch (Throwable) {
              exit(1);
          }
          '; then
            echo "Mail send unexpectedly succeeded against unavailable SMTP endpoint."
            exit 1
          fi

      - name: Validate production configuration fail-closed behavior
        run: |
          php artisan production:verify-configuration
          if APP_DEBUG=true php artisan production:verify-configuration; then
            echo "Production configuration verifier unexpectedly accepted APP_DEBUG=true."
            exit 1
          fi

      - name: Run exact-SHA critical regression suite
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          CACHE_STORE: array
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          MAIL_MAILER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: composer test

      - name: Validate running health, headers, cookies, correlation and error behavior
        run: |
          (
            cd /tmp/phase7-current
            php artisan serve --host=127.0.0.1 --port=8080 > /tmp/phase7-server.log 2>&1 &
            echo $! > /tmp/phase7-server.pid
          )
          trap 'kill "$(cat /tmp/phase7-server.pid)" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8080/health >/tmp/health.body
          curl -sS -D /tmp/home.headers -o /tmp/home.body http://127.0.0.1:8080/
          curl -sS -D /tmp/login.headers -o /tmp/login.body http://127.0.0.1:8080/login
          curl -sS -D /tmp/notfound.headers -o /tmp/notfound.body http://127.0.0.1:8080/definitely-not-a-route

          grep -qi '^Content-Security-Policy:' /tmp/home.headers
          grep -qi '^X-Content-Type-Options: nosniff' /tmp/home.headers
          grep -qi '^X-Frame-Options: DENY' /tmp/home.headers
          grep -qi '^Referrer-Policy: strict-origin-when-cross-origin' /tmp/home.headers
          grep -qi '^Permissions-Policy:' /tmp/home.headers
          grep -qi '^X-Request-ID:' /tmp/home.headers
          grep -qi '^Set-Cookie:.*Secure' /tmp/login.headers
          grep -qi '^Set-Cookie:.*HttpOnly' /tmp/login.headers
          ! grep -qi 'stack trace' /tmp/notfound.body
          ! grep -Fq "$APP_KEY" /tmp/notfound.body

          sleep 1
          grep -q 'http.request.completed' /tmp/phase7-server.log
          ! grep -Fq "$APP_KEY" /tmp/phase7-server.log

      - name: Validate backup, clean restore, integrity and restored smoke
        run: |
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" oteryn_platform <<SQL
          CREATE TABLE IF NOT EXISTS phase7_restore_probe (
              id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT PRIMARY KEY,
              validation_sha CHAR(40) NOT NULL
          );
          DELETE FROM phase7_restore_probe;
          INSERT INTO phase7_restore_probe (validation_sha) VALUES ('${VALIDATION_SHA}');
          SQL

          SOURCE_TABLES="$(mariadb --protocol=tcp -N -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='oteryn_platform';")"
          SOURCE_MIGRATIONS="$(mariadb --protocol=tcp -N -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "SELECT COUNT(*) FROM oteryn_platform.migrations;")"

          mariadb-dump --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" --single-transaction --skip-comments oteryn_platform > /tmp/phase7-platform.sql
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "DROP DATABASE IF EXISTS oteryn_restore; CREATE DATABASE oteryn_restore CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

          RESTORE_START="$(date +%s%3N)"
          mariadb --protocol=tcp -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" oteryn_restore < /tmp/phase7-platform.sql
          RESTORE_END="$(date +%s%3N)"
          RESTORE_MS="$((RESTORE_END - RESTORE_START))"

          RESTORE_TABLES="$(mariadb --protocol=tcp -N -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='oteryn_restore';")"
          RESTORE_MIGRATIONS="$(mariadb --protocol=tcp -N -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "SELECT COUNT(*) FROM oteryn_restore.migrations;")"
          RESTORE_SHA="$(mariadb --protocol=tcp -N -h127.0.0.1 -uroot -p"$MARIADB_ROOT_PASSWORD" -e "SELECT validation_sha FROM oteryn_restore.phase7_restore_probe LIMIT 1;")"

          test "$SOURCE_TABLES" = "$RESTORE_TABLES"
          test "$SOURCE_MIGRATIONS" = "$RESTORE_MIGRATIONS"
          test "$RESTORE_SHA" = "$VALIDATION_SHA"

          DB_DATABASE=oteryn_restore php artisan migrate:status --no-interaction >/tmp/restore-migrate-status.txt
          DB_DATABASE=oteryn_restore php artisan production:verify-configuration

          rm -f /tmp/phase7-platform.sql
          echo "RESTORE_MS=$RESTORE_MS" >> "$GITHUB_ENV"
          echo "SOURCE_TABLES=$SOURCE_TABLES" >> "$GITHUB_ENV"
          echo "RESTORE_TABLES=$RESTORE_TABLES" >> "$GITHUB_ENV"
          echo "SOURCE_MIGRATIONS=$SOURCE_MIGRATIONS" >> "$GITHUB_ENV"
          echo "RESTORE_MIGRATIONS=$RESTORE_MIGRATIONS" >> "$GITHUB_ENV"
          {
            echo "### Phase 7 production-like restore evidence"
            echo "- validation_sha: \`$VALIDATION_SHA\`"
            echo "- source_table_count: $SOURCE_TABLES"
            echo "- restored_table_count: $RESTORE_TABLES"
            echo "- source_migration_count: $SOURCE_MIGRATIONS"
            echo "- restored_migration_count: $RESTORE_MIGRATIONS"
            echo "- measured_restore_ms: $RESTORE_MS"
            echo "- classification: STAGING_PROVEN"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate rollback, interrupted release isolation and redeploy
        run: |
          mkdir -p "/tmp/phase7-releases/${BASE_SHA}"
          git archive "$BASE_SHA" | tar -x -C "/tmp/phase7-releases/${BASE_SHA}"
          (
            cd "/tmp/phase7-releases/${BASE_SHA}"
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
          )

          ln -sfn "/tmp/phase7-releases/${BASE_SHA}" /tmp/phase7-current
          test "$(readlink -f /tmp/phase7-current)" = "/tmp/phase7-releases/${BASE_SHA}"
          (
            cd /tmp/phase7-current
            php artisan production:verify-configuration
            php artisan migrate:status --no-interaction >/dev/null
          )

          CURRENT_BEFORE_INTERRUPTION="$(readlink -f /tmp/phase7-current)"
          mkdir -p "/tmp/phase7-releases/interrupted-${VALIDATION_SHA}"
          touch "/tmp/phase7-releases/interrupted-${VALIDATION_SHA}/INCOMPLETE"
          test "$(readlink -f /tmp/phase7-current)" = "$CURRENT_BEFORE_INTERRUPTION"

          ln -sfn "/tmp/phase7-releases/${VALIDATION_SHA}" /tmp/phase7-current
          test "$(readlink -f /tmp/phase7-current)" = "/tmp/phase7-releases/${VALIDATION_SHA}"
          (
            cd /tmp/phase7-current
            php artisan migrate --force --no-interaction
            php artisan production:verify-configuration
          )

          {
            echo "### Phase 7 production-like deployment evidence"
            echo "- validation_sha: \`$VALIDATION_SHA\`"
            echo "- rollback_sha: \`$BASE_SHA\`"
            echo "- clean_deploy: PASS"
            echo "- rollback_switch: PASS"
            echo "- interrupted_release_not_activated: PASS"
            echo "- redeploy_current_sha: PASS"
            echo "- classification: STAGING_PROVEN"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write non-secret staging evidence artifact
        run: |
          VALIDATED_AT_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > /tmp/phase7-production-like-evidence.json <<JSON
          {
            "classification": "STAGING_PROVEN",
            "validated_at_utc": "${VALIDATED_AT_UTC}",
            "validation_sha": "${VALIDATION_SHA}",
            "rollback_sha": "${BASE_SHA}",
            "clean_deploy": "PASS",
            "migrations": "PASS",
            "configuration_guardrails": "PASS",
            "canary_readonly_privileges": "PASS",
