name: UI UX Diagnostic Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
      CANARY_CHARACTER_CREATE_INTEGRATION_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_INTEGRATION_PORT: 3306
      CANARY_CHARACTER_CREATE_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Capture full PHPUnit diagnostics
        run: |
          mkdir -p artifacts/ui-ux-diagnostics
          set +e
          php artisan config:clear --ansi >/dev/null 2>&1
          php artisan test --log-junit artifacts/ui-ux-diagnostics/phpunit.xml > artifacts/ui-ux-diagnostics/phpunit.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > artifacts/ui-ux-diagnostics/status.txt
          tail -n 250 artifacts/ui-ux-diagnostics/phpunit.log
      - name: Upload diagnostics
        uses: actions/upload-artifact@v6
        with:
          name: ui-ux-phpunit-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ui-ux-diagnostics
          if-no-files-found: error
          retention-days: 1
