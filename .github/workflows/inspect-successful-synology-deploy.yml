name: Inspect Successful Synology Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-successful-synology-deploy.yml

permissions:
  actions: read
  contents: read

jobs:
  inspect-actions-log:
    runs-on: ubuntu-latest
    steps:
      - name: Extract sanitized deployment success evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          job_id=89465155605
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}" \
            --jq '{id,name,status,conclusion,runner_name,runner_group_name,labels,steps:[.steps[]|{number,name,status,conclusion}]}'
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > /tmp/deploy-success.log
          python3 - <<'PY'
          from pathlib import Path

          markers = (
              'Platform, Gateway and Canary staging probes passed.',
              'Oteryn Synology staging deployment is healthy.',
          )
          lines = Path('/tmp/deploy-success.log').read_text(errors='replace').splitlines()
          matches = [line for line in lines if any(marker in line for marker in markers)]
          if len(matches) != len(markers):
              raise SystemExit(f'Expected {len(markers)} success markers, found {len(matches)}.')
          for line in matches:
              print(line)
          PY

  inspect-runtime:
    runs-on: oteryn-staging
    steps:
      - name: Verify non-secret runtime state and bindings
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          project = 'oteryn-staging'
          required_services = ('mariadb', 'redis', 'canary', 'platform', 'internal-proxy', 'gateway')
          expected_images = {
              'platform': 'ghcr.io/blakinio/oteryn-platform:sha-e08548866e6edc70f69eaba40249303b69236625',
              'gateway': 'ghcr.io/blakinio/oteryn-game-gateway:sha-e08548866e6edc70f69eaba40249303b69236625',
              'canary': 'ghcr.io/blakinio/canary@sha256:784e5dbdcc64e311c48c51cd94aa206e2efa1e5eefb2f4ef40170d5aac55031f',
          }
          expected_ports = {
              'platform': {'8000/tcp': ('127.0.0.1', '8000')},
              'gateway': {'8080/tcp': ('127.0.0.1', '8080')},
              'canary': {
                  '7171/tcp': ('127.0.0.1', '7171'),
                  '7172/tcp': ('127.0.0.1', '7172'),
              },
          }

          def run(*args: str) -> str:
              return subprocess.check_output(args, text=True).strip()

          containers = {}
          for service in required_services:
              ids = run(
                  'docker', 'ps', '-q',
                  '--filter', f'label=com.docker.compose.project={project}',
                  '--filter', f'label=com.docker.compose.service={service}',
              ).splitlines()
              if len(ids) != 1:
                  raise SystemExit(f'{service}: expected one running container, found {len(ids)}')
              containers[service] = ids[0]

          for service, cid in containers.items():
              data = json.loads(run('docker', 'inspect', cid))[0]
              state = data['State']
              if not state.get('Running'):
                  raise SystemExit(f'{service}: container is not running')
              image = data['Config']['Image']
              expected_image = expected_images.get(service)
              if expected_image and image != expected_image:
                  raise SystemExit(f'{service}: unexpected image {image}')
              health = (state.get('Health') or {}).get('Status', 'none')
              print(
                  f'service={service} running=true health={health} '
                  f'restart_count={data.get("RestartCount", 0)} image={image}'
              )

              ports = data.get('NetworkSettings', {}).get('Ports') or {}
              normalized = {}
              for container_port, bindings in ports.items():
                  if not bindings:
                      continue
                  if len(bindings) != 1:
                      raise SystemExit(f'{service}: expected one binding for {container_port}')
                  binding = bindings[0]
                  host = (binding.get('HostIp', ''), binding.get('HostPort', ''))
                  if host[0] != '127.0.0.1':
                      raise SystemExit(f'{service}: non-loopback binding {container_port} -> {host}')
                  normalized[container_port] = host
                  print(f'binding={service}:{container_port}->{host[0]}:{host[1]}')

              expected = expected_ports.get(service, {})
              if normalized != expected:
                  raise SystemExit(f'{service}: bindings {normalized} do not match expected {expected}')

          workspace_env = Path(os.environ['GITHUB_WORKSPACE']) / 'deploy/synology/.env'
          known_env = Path('/work/Oteryn-Platform/Oteryn-Platform/deploy/synology/.env')
          for path in {workspace_env, known_env}:
              if path.exists():
                  raise SystemExit(f'ephemeral environment file still exists at {path}')
          print('ephemeral_env_absent=true')
          print('runtime_binding_policy=loopback-only')
          PY
