name: Phase 6 Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Format the three reported files
        run: vendor/bin/pint app/Cms/Actions/SaveManagedPage.php app/Cms/Actions/SaveNewsPost.php routes/console.php --no-ansi

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: phase6-pint-fixed-files
          path: |
            app/Cms/Actions/SaveManagedPage.php
            app/Cms/Actions/SaveNewsPost.php
            routes/console.php
