name: Phase 6 Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies without scripts
        run: composer install --no-interaction --prefer-dist --no-progress --quiet --no-scripts

      - name: Capture Laravel package discovery
        id: discovery
        shell: bash
        run: |
          set +e
          php artisan package:discover --no-ansi > phase6-debug.log 2>&1
          status=$?
          echo "exit_status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: phase6-bootstrap-debug
          path: phase6-debug.log

      - name: Fail when discovery failed
        if: steps.discovery.outputs.exit_status != '0'
        run: exit 1
