name: Bootstrap Composer lock

on:
  push:
    branches:
      - task/OTERYN-20260718-laravel-bootstrap
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Resolve dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Commit Composer lock on task branch
        if: github.event_name == 'push'
        run: |
          if git ls-files --error-unmatch composer.lock >/dev/null 2>&1 && git diff --quiet -- composer.lock; then
            echo "composer.lock is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git commit -m "build: lock Composer dependencies"
          git push

      - name: Upload Composer lock
        uses: actions/upload-artifact@v7
        with:
          name: composer-lock
          path: composer.lock
          if-no-files-found: error

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Run tests
        run: composer test
