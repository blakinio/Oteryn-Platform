name: Static Analysis Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Capture PHPStan output
        id: analyse
        shell: bash
        run: |
          set +e
          composer analyse > static-analysis-diagnostic.txt 2>&1
          status=$?
          cat static-analysis-diagnostic.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload static analysis diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-diagnostic
          path: static-analysis-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Preserve analysis result
        run: exit "${{ steps.analyse.outputs.status }}"
