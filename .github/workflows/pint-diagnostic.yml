name: Pint Exact Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist --no-progress --quiet
      - name: Generate exact patch
        run: |
          vendor/bin/pint
          git diff -- . > pint.patch
          cat pint.patch
      - uses: actions/upload-artifact@v4
        with:
          name: pint-exact-patch
          path: pint.patch
          if-no-files-found: error
          retention-days: 1
