name: Pint Diagnostic

on:
  push:
    branches:
      - task/OTERYN-20260723-native-auth-production-cutover

permissions:
  contents: read

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Capture Pint patch
        id: pint
        shell: bash
        run: |
          set +e
          vendor/bin/pint --test > pint-diagnostic.txt 2>&1
          status=$?
          cat pint-diagnostic.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Pint diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pint-diagnostic
          path: pint-diagnostic.txt
          if-no-files-found: error
          retention-days: 1

      - name: Preserve formatter result
        run: exit "${{ steps.pint.outputs.status }}"
