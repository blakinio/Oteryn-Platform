name: Acceptance E2E and Visual UX

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'public/**'
      - 'resources/views/**'
      - 'routes/**'
      - 'scripts/acceptance/**'
      - '.github/workflows/acceptance-validation.yml'
      - 'composer.json'
      - 'composer.lock'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: Acceptance profile to execute
        required: true
        default: full
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

concurrency:
  group: acceptance-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: acceptance-ci-root-not-a-secret
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    env:
      ACCEPTANCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      VALIDATION_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      ACCEPTANCE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      ACCEPTANCE_BASE_URL: http://127.0.0.1:8080
      ACCEPTANCE_MAILHOG_URL: http://127.0.0.1:8025
      ACCEPTANCE_OUTPUT_DIR: /tmp/oteryn-visual-acceptance
      ACCEPTANCE_PROFILE: ${{ github.event_name == 'pull_request' && github.head_ref != 'task/OTERYN-20260721-functional-visual-acceptance' && 'smoke' || github.event_name == 'workflow_dispatch' && inputs.profile || 'full' }}
      APP_ENV: acceptance
      APP_DEBUG: 'false'
      APP_URL: http://127.0.0.1:8080
      LOG_CHANNEL: stderr_json
      LOG_LEVEL: info
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: 'false'
      SESSION_HTTP_ONLY: 'true'
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: smtp
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: ''
      MAIL_FROM_ADDRESS: acceptance@staging.oteryn
      MAIL_FROM_NAME: Oteryn Acceptance
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: oteryn_platform_acceptance
      DB_USERNAME: root
      DB_PASSWORD: acceptance-ci-root-not-a-secret
      CANARY_DB_HOST: 127.0.0.1
      CANARY_DB_PORT: 3306
      CANARY_DB_DATABASE: canary_acceptance
      CANARY_DB_USERNAME: oteryn_acceptance_readonly
      CANARY_DB_PASSWORD: acceptance-ci-readonly-not-a-secret
      CANARY_PROVISIONING_DB_HOST: 127.0.0.1
      CANARY_PROVISIONING_DB_PORT: 3306
      CANARY_PROVISIONING_DB_DATABASE: canary_acceptance
      CANARY_PROVISIONING_DB_USERNAME: oteryn_acceptance_provisioning
      CANARY_PROVISIONING_DB_PASSWORD: acceptance-ci-provisioning-not-a-secret
      CANARY_CHARACTER_CREATE_DB_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_DB_PORT: 3306
      CANARY_CHARACTER_CREATE_DB_DATABASE: canary_acceptance
      CANARY_CHARACTER_CREATE_DB_USERNAME: oteryn_acceptance_character_create
      CANARY_CHARACTER_CREATE_DB_PASSWORD: acceptance-ci-character-not-a-secret
      CANARY_RUNTIME_REDIS_CLIENT: phpredis
      CANARY_RUNTIME_REDIS_SCHEME: tcp
      CANARY_RUNTIME_REDIS_HOST: 127.0.0.1
      CANARY_RUNTIME_REDIS_PORT: 6379
      CANARY_RUNTIME_REDIS_DB: 0
      CANARY_RUNTIME_REDIS_USERNAME: oteryn_acceptance_runtime
      CANARY_RUNTIME_REDIS_PASSWORD: acceptance-ci-runtime-not-a-secret
      MARIADB_ROOT_PASSWORD: acceptance-ci-root-not-a-secret

    steps:
      - name: Checkout exact acceptance SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, redis
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install acceptance system clients
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mariadb-client redis-tools imagemagick

      - name: Install application dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install pinned browser harness
        run: |
          npm --prefix scripts/acceptance install --no-audit --no-fund
          cd scripts/acceptance
          npx playwright install --with-deps chromium

      - name: Generate ephemeral acceptance application key
        run: echo "APP_KEY=$(php -r 'echo "base64:".base64_encode(random_bytes(32));')" >> "$GITHUB_ENV"

      - name: Provision isolated production-like dependencies
        run: bash scripts/acceptance/bootstrap-production-like.sh

      - name: Start exact-SHA Laravel HTTP runtime
        run: |
          mkdir -p artifacts/acceptance
          php artisan serve --host=127.0.0.1 --port=8080 >/tmp/oteryn-acceptance-server.log 2>&1 &
          echo $! >/tmp/oteryn-acceptance-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo 'Acceptance HTTP runtime did not become healthy.' >&2
          exit 1

      - name: Execute browser acceptance profile
        id: e2e
        run: |
          echo "Exact tested SHA: $ACCEPTANCE_SHA"
          echo "Acceptance profile: $ACCEPTANCE_PROFILE"
          if [ "$ACCEPTANCE_PROFILE" = 'smoke' ]; then
            npm --prefix scripts/acceptance run test:smoke
          else
            npm --prefix scripts/acceptance test
          fi

      - name: Seed deterministic exploratory visual fixtures
        if: steps.e2e.outcome == 'success' && env.ACCEPTANCE_PROFILE == 'full'
        run: php scripts/acceptance/seed.php seed >/tmp/oteryn-visual-seed.json

      - name: Execute bounded exploratory visual and accessibility pass
        id: visual
        if: steps.e2e.outcome == 'success' && env.ACCEPTANCE_PROFILE == 'full'
        run: node scripts/acceptance/visual-acceptance.js

      - name: Build visual contact sheet
        if: always() && env.ACCEPTANCE_PROFILE == 'full'
        run: |
          if compgen -G "$ACCEPTANCE_OUTPUT_DIR/screenshots/*.png" > /dev/null; then
            montage "$ACCEPTANCE_OUTPUT_DIR"/screenshots/*.png \
              -thumbnail '240x180>' \
              -tile 4x \
              -geometry +4+4 \
              -quality 72 \
              "$ACCEPTANCE_OUTPUT_DIR/contact-sheet.jpg"
          fi
          if [ -d "$ACCEPTANCE_OUTPUT_DIR" ]; then
            mkdir -p artifacts/acceptance/visual
            cp -R "$ACCEPTANCE_OUTPUT_DIR"/. artifacts/acceptance/visual/
          fi
          if [ -f "$ACCEPTANCE_OUTPUT_DIR/visual-acceptance-summary.md" ]; then
            cat "$ACCEPTANCE_OUTPUT_DIR/visual-acceptance-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write durable non-secret acceptance evidence
        if: always()
        env:
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
        run: |
          mkdir -p artifacts/acceptance
          if [ "$E2E_OUTCOME" = 'success' ] && [ "$ACCEPTANCE_PROFILE" = 'full' ]; then
            AUTOMATED_E2E='AUTOMATED_E2E_PASS'
            FUNCTIONAL='FUNCTIONAL_ACCEPTANCE_STAGING_PROVEN'
          elif [ "$E2E_OUTCOME" = 'success' ]; then
            AUTOMATED_E2E='AUTOMATED_E2E_SMOKE_PASS'
            FUNCTIONAL='FULL_ACCEPTANCE_NOT_EXECUTED'
          else
            AUTOMATED_E2E='AUTOMATED_E2E_FAIL'
            FUNCTIONAL='FUNCTIONAL_ACCEPTANCE_NOT_PROVEN'
          fi

          if [ "$ACCEPTANCE_PROFILE" = 'full' ] && [ "$VISUAL_OUTCOME" = 'success' ]; then
            VISUAL_UX='VISUAL_UX_EXPLORATORY_EXECUTED'
          elif [ "$ACCEPTANCE_PROFILE" = 'full' ]; then
            VISUAL_UX='VISUAL_UX_ACCEPTANCE_NOT_PROVEN'
          else
            VISUAL_UX='VISUAL_UX_NOT_EXECUTED'
          fi

          cat > artifacts/acceptance/evidence.json <<JSON
          {
            "exact_tested_sha": "$ACCEPTANCE_SHA",
            "run_id": "$ACCEPTANCE_RUN_ID",
            "profile": "$ACCEPTANCE_PROFILE",
            "browser": "chromium",
            "runtime": "real Laravel HTTP",
            "platform_database": "MariaDB 11.8 isolated acceptance schema",
            "canary_database": "MariaDB 11.8 isolated acceptance schema with operation-specific principals",
            "runtime_dependency": "Redis 7.4 with dedicated ACL principal",
            "mail_dependency": "MailHog SMTP test service",
            "automated_e2e": "$AUTOMATED_E2E",
            "functional_acceptance": "$FUNCTIONAL",
            "visual_ux_acceptance": "$VISUAL_UX",
            "production_smoke": "PRODUCTION_SMOKE_PENDING",
            "e2e_result": "$E2E_OUTCOME",
            "visual_result": "$VISUAL_OUTCOME"
          }
          JSON

          {
            echo '### Oteryn acceptance evidence'
            echo "- exact tested SHA: \`$ACCEPTANCE_SHA\`"
            echo "- profile: \`$ACCEPTANCE_PROFILE\`"
            echo "- automated E2E: \`$AUTOMATED_E2E\`"
            echo "- functional acceptance: \`$FUNCTIONAL\`"
            echo "- visual/UX execution: \`$VISUAL_UX\`"
            echo '- production smoke: `PRODUCTION_SMOKE_PENDING`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload acceptance evidence and failure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/acceptance
          if-no-files-found: error
          retention-days: 14
