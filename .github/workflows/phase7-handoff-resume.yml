name: Phase 7 Handoff Resume

on:
  push:
    branches:
      - task/OTERYN-20260720-phase7-production-evidence-collection

permissions:
  contents: read

jobs:
  handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate active checkpoint
        run: python tools/agents/checkpoint.py docs/agents/tasks/active/OTERYN-20260720-phase7-production-evidence-collection.md --require-checkpoint

      - name: Generate compact resume handoff
        run: python tools/agents/resume.py --task docs/agents/tasks/active/OTERYN-20260720-phase7-production-evidence-collection.md | tee resume-output.txt

      - name: Upload resume output
        uses: actions/upload-artifact@v4
        with:
          name: phase7-resume-output
          path: resume-output.txt
