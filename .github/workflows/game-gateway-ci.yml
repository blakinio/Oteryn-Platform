name: Game Gateway CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/game-gateway/**'
      - '.github/workflows/game-gateway-ci.yml'

permissions:
  contents: write

concurrency:
  group: game-gateway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-bootstrap:
    if: github.event.pull_request.number == 122
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/game-gateway
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/game-gateway/go.mod
          cache-dependency-path: services/game-gateway/go.mod

      - name: Apply gofmt
        run: gofmt -w .

      - name: Commit formatting
        shell: bash
        working-directory: .
        run: |
          git add services/game-gateway
          if git diff --cached --quiet; then
            echo "Go sources are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style(gateway): apply canonical gofmt"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
