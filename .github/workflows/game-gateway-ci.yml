name: Game Gateway CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'services/game-gateway/**'
      - '.github/workflows/game-gateway-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'services/game-gateway/**'
      - '.github/workflows/game-gateway-ci.yml'

permissions:
  contents: read

concurrency:
  group: game-gateway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/game-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/game-gateway/go.mod
          cache-dependency-path: services/game-gateway/go.mod

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf 'Unformatted Go files:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build gateway
        run: go build -trimpath -o /tmp/oteryn-game-gateway ./cmd/game-gateway
