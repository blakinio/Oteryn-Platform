name: Patch Native Auth Correlation Readiness

on:
  push:
    branches:
      - test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
    paths:
      - ".github/workflows/patch-native-auth-correlation-readiness.yml"

permissions:
  contents: write

jobs:
  patch-and-remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
          fetch-depth: 0

      - name: Apply log readiness polling and remove helper
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tests/e2e/native_auth_ephemeral_cutover/acceptance_extensions.py')
          text = path.read_text(encoding='utf-8')
          import_old = 'import shutil\nfrom pathlib import Path\n'
          import_new = 'import shutil\nimport time\nfrom pathlib import Path\n'
          if text.count(import_old) != 1:
              raise SystemExit(f'expected one import marker, found {text.count(import_old)}')
          text = text.replace(import_old, import_new, 1)

          old = '''        platform_logs = harness.docker("logs", self.container("platform"), check=False)\n        gateway_logs = harness.docker("logs", self.container("gateway"), check=False)\n        platform_log_text = ((platform_logs.stdout or b"") + (platform_logs.stderr or b"")).decode("utf-8", errors="replace")\n        gateway_log_text = ((gateway_logs.stdout or b"") + (gateway_logs.stderr or b"")).decode("utf-8", errors="replace")\n'''
          new = '''        platform_log_text = ""\n        for _ in range(40):\n            platform_logs = harness.docker("logs", self.container("platform"), check=False)\n            platform_log_text = ((platform_logs.stdout or b"") + (platform_logs.stderr or b"")).decode("utf-8", errors="replace")\n            if platform_request_id and platform_request_id in platform_log_text:\n                break\n            time.sleep(0.25)\n\n        gateway_log_text = ""\n        for _ in range(40):\n            gateway_logs = harness.docker("logs", self.container("gateway"), check=False)\n            gateway_log_text = ((gateway_logs.stdout or b"") + (gateway_logs.stderr or b"")).decode("utf-8", errors="replace")\n            if correlation_id in gateway_log_text:\n                break\n            time.sleep(0.25)\n'''
          if text.count(old) != 1:
              raise SystemExit(f'expected one correlation log block, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/patch-native-auth-correlation-readiness.yml
          git diff --check
          python3 -m py_compile tests/e2e/native_auth_ephemeral_cutover/acceptance_extensions.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/native_auth_ephemeral_cutover/acceptance_extensions.py
          git commit -m "test(e2e): wait for request correlation logs"
          git push origin HEAD:test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
