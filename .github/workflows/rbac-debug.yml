name: RBAC Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  rbac:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Run focused RBAC test
        run: php artisan test --filter=test_explicit_role_permission_with_confirmed_mfa_allows_access --no-ansi
