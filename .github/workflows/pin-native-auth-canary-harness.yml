name: Pin Native Auth Canary Harness

on:
  push:
    branches:
      - test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
    paths:
      - ".github/workflows/pin-native-auth-canary-harness.yml"

permissions:
  contents: write

jobs:
  pin-and-remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
          fetch-depth: 0

      - name: Pin exact harness and remove helper
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/native-auth-ephemeral-cutover-rehearsal.yml')
          text = path.read_text(encoding='utf-8')
          old = 'CANARY_HARNESS_REF: 9200c562e7e87dd098c1205c1df83c9d9ce95c1b'
          new = 'CANARY_HARNESS_REF: 1046687e44aa2f9321cf7d71364dc076aedf08c5'
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one old harness pin, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/pin-native-auth-canary-harness.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/native-auth-ephemeral-cutover-rehearsal.yml
          git commit -m "test(e2e): pin corrected Canary harness"
          git push origin HEAD:test/OTERYN-20260723-native-auth-ephemeral-cutover-rehearsal
