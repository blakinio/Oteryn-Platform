name: Phase 7 Correlation Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Capture PHPStan output
        id: analyse
        shell: bash
        run: |
          set +e
          composer analyse > phase7-correlation-analysis.log 2>&1
          status=$?
          echo "exit_status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload PHPStan diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: phase7-correlation-analysis
          path: phase7-correlation-analysis.log

      - name: Fail when PHPStan failed
        if: steps.analyse.outputs.exit_status != '0'
        run: exit 1
