name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      # Temporary hard-fail diagnostics for PR #33. The first failing file
      # identifies the exact formatting defect. Remove before merge.
      - name: Pint ProvisionCanaryAccount action
        run: vendor/bin/pint --test app/Accounts/Actions/ProvisionCanaryAccount.php
      - name: Pint provisioning gateway contract
        run: vendor/bin/pint --test app/Accounts/Contracts/CanaryAccountProvisioningGateway.php
      - name: Pint provisioning conflict exception
        run: vendor/bin/pint --test app/Accounts/Exceptions/CanaryAccountProvisioningConflict.php
      - name: Pint provisioning base exception
        run: vendor/bin/pint --test app/Accounts/Exceptions/CanaryAccountProvisioningException.php
      - name: Pint provisioning unavailable exception
        run: vendor/bin/pint --test app/Accounts/Exceptions/CanaryAccountProvisioningUnavailable.php
      - name: Pint IdentityCanaryAccount model
        run: vendor/bin/pint --test app/Accounts/Models/IdentityCanaryAccount.php
      - name: Pint SecurityEventRecorder
        run: vendor/bin/pint --test app/Audit/SecurityEventRecorder.php
      - name: Pint CanaryAccountProvisioner
        run: vendor/bin/pint --test app/CanaryIntegration/CanaryAccountProvisioner.php
      - name: Pint Canary provisioning privilege verifier
        run: vendor/bin/pint --test app/CanaryIntegration/CanaryProvisioningDatabasePrivilegeVerifier.php
      - name: Pint RegisterIdentity
        run: vendor/bin/pint --test app/Identity/Actions/RegisterIdentity.php
      - name: Pint AppServiceProvider
        run: vendor/bin/pint --test app/Providers/AppServiceProvider.php

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
