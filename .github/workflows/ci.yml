name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check formatting
        run: composer format:check

      - name: Run static analysis
        run: composer analyse

      - name: Capture static-analysis diagnostics
        if: failure()
        run: composer analyse > phpstan-diagnostic.txt 2>&1 || true

      - name: Upload static-analysis diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-diagnostic
          path: phpstan-diagnostic.txt

      - name: Run tests
        run: composer test
