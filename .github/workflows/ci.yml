name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      # Temporary hard-fail diagnostics for PR #33. Remove before merge.
      - name: Pint config/database.php
        run: vendor/bin/pint --test config/database.php
      - name: Pint identity Canary migration
        run: vendor/bin/pint --test database/migrations/2026_07_20_011000_create_identity_canary_accounts_table.php
      - name: Pint routes/console.php
        run: vendor/bin/pint --test routes/console.php
      - name: Pint MariaDB integration test
        run: vendor/bin/pint --test tests/Feature/Accounts/CanaryProvisioningMariaDbIntegrationTest.php
      - name: Pint provisioning saga test
        run: vendor/bin/pint --test tests/Feature/Accounts/ProvisionCanaryAccountTest.php
      - name: Pint registration test
        run: vendor/bin/pint --test tests/Feature/Identity/RegistrationTest.php
      - name: Pint provisioning privilege verifier test
        run: vendor/bin/pint --test tests/Unit/CanaryIntegration/CanaryProvisioningDatabasePrivilegeVerifierTest.php

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
