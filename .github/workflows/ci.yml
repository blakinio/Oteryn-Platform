name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      # Temporary finder diagnostics for PR #33. Remove before merge once the
      # global-only Pint failure is isolated; the repository-wide gate remains below.
      - name: Pint directory app
        continue-on-error: true
        run: vendor/bin/pint --test app
      - name: Pint directory bootstrap
        continue-on-error: true
        run: vendor/bin/pint --test bootstrap
      - name: Pint directory config
        continue-on-error: true
        run: vendor/bin/pint --test config
      - name: Pint directory database
        continue-on-error: true
        run: vendor/bin/pint --test database
      - name: Pint directory routes
        continue-on-error: true
        run: vendor/bin/pint --test routes
      - name: Pint directory tests
        continue-on-error: true
        run: vendor/bin/pint --test tests

      - name: Check formatting
        run: composer format:check

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
