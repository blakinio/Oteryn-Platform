name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-diagnostic:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Show PHPStan errors on PHP 8.5
        run: |
          git init -q repo
          cd repo
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "refs/pull/${{ github.event.pull_request.number }}/merge"
          git checkout -q FETCH_HEAD
          curl -sS https://getcomposer.org/download/latest-stable/composer.phar -o composer.phar
          docker pull -q php:8.5-cli >/dev/null
          docker run --rm -v "$PWD:/app" -w /app php:8.5-cli sh -lc 'apt-get update -qq && apt-get install -y -qq unzip >/dev/null && php composer.phar install --no-interaction --prefer-dist --no-progress --quiet --ignore-platform-reqs && php vendor/bin/phpstan analyse --no-progress --memory-limit=512M'

  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
      CANARY_CHARACTER_CREATE_INTEGRATION_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_INTEGRATION_PORT: 3306
      CANARY_CHARACTER_CREATE_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Run static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
