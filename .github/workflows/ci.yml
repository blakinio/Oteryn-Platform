name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
      CANARY_CHARACTER_CREATE_INTEGRATION_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_INTEGRATION_PORT: 3306
      CANARY_CHARACTER_CREATE_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2

      - name: Validate Composer metadata and lockfile
        run: composer validate --strict

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Check formatting
        run: vendor/bin/pint --test

      - name: Capture static analysis
        run: |
          set +e
          composer analyse > wiki-phpstan.txt 2>&1
          echo "$?" > wiki-phpstan.exit
          exit 0

      - name: Capture tests
        run: |
          set +e
          composer test > wiki-tests.txt 2>&1
          echo "$?" > wiki-tests.exit
          exit 0

      - name: Upload Wiki validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: wiki-validation-diagnostics
          path: |
            wiki-phpstan.txt
            wiki-phpstan.exit
            wiki-tests.txt
            wiki-tests.exit
          if-no-files-found: error
          retention-days: 1

      - name: Fail on validation errors
        run: |
          test "$(cat wiki-phpstan.exit)" -eq 0
          test "$(cat wiki-tests.exit)" -eq 0
