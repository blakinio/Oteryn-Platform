name: Trusted Proxy Static Analysis Diagnostic

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/OTERYN-20260724-trusted-reverse-proxy-scheme
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trusted-proxy-static-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Capture PHPStan output
        id: analyse
        shell: bash
        run: |
          set +e
          composer analyse > phpstan.log 2>&1
          status=$?
          cat phpstan.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload PHPStan diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trusted-proxy-phpstan-diagnostic
          path: phpstan.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce PHPStan result
        if: steps.analyse.outputs.status != '0'
        run: exit 1
