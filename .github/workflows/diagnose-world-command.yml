name: Diagnose World Command

on:
  pull_request:
    branches:
      - main
    paths:
      - app/Console/Commands/EnsureGameWorld.php
      - tests/Feature/GameAuth/EnsureGameWorldCommandTest.php
      - .github/workflows/diagnose-world-command.yml

permissions:
  contents: read

jobs:
  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist --quiet
      - name: Capture focused PHPStan output
        id: analyse
        continue-on-error: true
        run: |
          set +e
          vendor/bin/phpstan analyse \
            app/Console/Commands/EnsureGameWorld.php \
            tests/Feature/GameAuth/EnsureGameWorldCommandTest.php \
            --memory-limit=1G \
            --error-format=raw \
            --no-progress > phpstan-world-command.txt 2>&1
          status=$?
          printf '%s\n' "$status" > phpstan-world-command.status
          exit "$status"
      - name: Upload focused diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-world-command
          path: |
            phpstan-world-command.txt
            phpstan-world-command.status
          retention-days: 1
          if-no-files-found: error
      - name: Preserve failure status
        if: steps.analyse.outcome == 'failure'
        run: exit 1
