name: Full Production-Like E2E Simulation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  comprehensive:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: acceptance-ci-root-not-a-secret
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    env:
      ACCEPTANCE_SHA: ${{ github.event.pull_request.head.sha }}
      VALIDATION_SHA: ${{ github.event.pull_request.head.sha }}
      ACCEPTANCE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-comprehensive
      ACCEPTANCE_RUN_SUFFIX: comprehensive
      ACCEPTANCE_ZERO_RETRIES: '1'
      ACCEPTANCE_SOAK_SECONDS: '300'
      ACCEPTANCE_BASE_URL: http://127.0.0.1:8080
      ACCEPTANCE_MAILHOG_URL: http://127.0.0.1:8025
      ACCEPTANCE_OUTPUT_DIR: /tmp/oteryn-visual-acceptance
      APP_ENV: acceptance
      APP_DEBUG: 'false'
      APP_URL: http://127.0.0.1:8080
      LOG_CHANNEL: stderr_json
      LOG_LEVEL: info
      SESSION_DRIVER: file
      SESSION_SECURE_COOKIE: 'false'
      SESSION_HTTP_ONLY: 'true'
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: smtp
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: ''
      MAIL_FROM_ADDRESS: acceptance@staging.oteryn
      MAIL_FROM_NAME: Oteryn Acceptance
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: oteryn_platform_acceptance
      DB_USERNAME: root
      DB_PASSWORD: acceptance-ci-root-not-a-secret
      CANARY_DB_HOST: 127.0.0.1
      CANARY_DB_PORT: 3306
      CANARY_DB_DATABASE: canary_acceptance
      CANARY_DB_USERNAME: oteryn_acceptance_readonly
      CANARY_DB_PASSWORD: acceptance-ci-readonly-not-a-secret
      CANARY_PROVISIONING_DB_HOST: 127.0.0.1
      CANARY_PROVISIONING_DB_PORT: 3306
      CANARY_PROVISIONING_DB_DATABASE: canary_acceptance
      CANARY_PROVISIONING_DB_USERNAME: oteryn_acceptance_provisioning
      CANARY_PROVISIONING_DB_PASSWORD: acceptance-ci-provisioning-not-a-secret
      CANARY_CHARACTER_CREATE_DB_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_DB_PORT: 3306
      CANARY_CHARACTER_CREATE_DB_DATABASE: canary_acceptance
      CANARY_CHARACTER_CREATE_DB_USERNAME: oteryn_acceptance_character_create
      CANARY_CHARACTER_CREATE_DB_PASSWORD: acceptance-ci-character-not-a-secret
      CANARY_RUNTIME_REDIS_CLIENT: phpredis
      CANARY_RUNTIME_REDIS_SCHEME: tcp
      CANARY_RUNTIME_REDIS_HOST: 127.0.0.1
      CANARY_RUNTIME_REDIS_PORT: 6379
      CANARY_RUNTIME_REDIS_DB: 0
      CANARY_RUNTIME_REDIS_USERNAME: oteryn_acceptance_runtime
      CANARY_RUNTIME_REDIS_PASSWORD: acceptance-ci-runtime-not-a-secret
      MARIADB_ROOT_PASSWORD: acceptance-ci-root-not-a-secret

    steps:
      - name: Checkout exact validation SHA
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, redis
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install validation dependencies and browsers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mariadb-client redis-tools imagemagick
          composer install --no-interaction --prefer-dist --no-progress
          npm --prefix scripts/acceptance install --no-audit --no-fund
          cd scripts/acceptance
          npx playwright install --with-deps chromium firefox webkit

      - name: Generate ephemeral acceptance application key
        run: php -r 'echo "APP_KEY=base64:".base64_encode(random_bytes(32)).PHP_EOL;' >> "$GITHUB_ENV"

      - name: Provision isolated production-like dependencies
        run: bash scripts/acceptance/bootstrap-production-like.sh

      - name: Start exact-SHA Laravel HTTP runtime
        run: |
          mkdir -p artifacts/acceptance
          php artisan serve --host=127.0.0.1 --port=8080 >/tmp/oteryn-acceptance-server.log 2>&1 &
          echo $! >/tmp/oteryn-acceptance-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/oteryn-acceptance-server.log >&2 || true
          exit 1

      - name: Execute full primary Chromium acceptance baseline
        id: full
        continue-on-error: true
        run: |
          set +e
          npm --prefix scripts/acceptance test
          STATUS=$?
          set -e
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-full.xml; fi
          exit "$STATUS"

      - name: Execute zero-retry Chromium Firefox WebKit portability
        id: portability
        if: always()
        continue-on-error: true
        run: |
          set +e
          npm --prefix scripts/acceptance run test:portability
          STATUS=$?
          set -e
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-portability.xml; fi
          exit "$STATUS"

      - name: Execute desktop tablet mobile responsive coverage
        id: responsive
        if: always()
        continue-on-error: true
        run: |
          set +e
          npm --prefix scripts/acceptance run test:responsive
          STATUS=$?
          set -e
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-responsive.xml; fi
          exit "$STATUS"

      - name: Execute public dependency failure restoration recovery
        id: resilience
        if: always()
        continue-on-error: true
        run: |
          set +e
          npm --prefix scripts/acceptance run test:resilience
          STATUS=$?
          set -e
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-resilience.xml; fi
          exit "$STATUS"

      - name: Execute keyboard focus accessibility interactions
        id: accessibility
        if: always()
        continue-on-error: true
        run: |
          set +e
          npm --prefix scripts/acceptance run test:accessibility
          STATUS=$?
          set -e
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-accessibility.xml; fi
          exit "$STATUS"

      - name: Seed deterministic exploratory visual fixtures
        id: visual_seed
        if: always()
        continue-on-error: true
        run: php scripts/acceptance/seed.php seed >/tmp/oteryn-visual-seed.json

      - name: Execute exploratory visual and accessibility pass
        id: visual
        if: always()
        continue-on-error: true
        run: node scripts/acceptance/visual-acceptance.js

      - name: Build visual contact sheet
        if: always()
        run: |
          if compgen -G "$ACCEPTANCE_OUTPUT_DIR/screenshots/*.png" > /dev/null; then
            montage "$ACCEPTANCE_OUTPUT_DIR"/screenshots/*.png \
              -thumbnail '240x180>' \
              -tile 4x \
              -geometry +4+4 \
              -quality 72 \
              "$ACCEPTANCE_OUTPUT_DIR/contact-sheet.jpg"
          fi
          if [ -d "$ACCEPTANCE_OUTPUT_DIR" ]; then
            mkdir -p artifacts/acceptance/visual
            cp -R "$ACCEPTANCE_OUTPUT_DIR"/. artifacts/acceptance/visual/
          fi

      - name: Reset isolated dependencies before soak
        id: soak_reset
        if: always()
        continue-on-error: true
        run: |
          if [ -f /tmp/oteryn-acceptance-server.pid ]; then
            kill "$(cat /tmp/oteryn-acceptance-server.pid)" >/dev/null 2>&1 || true
          fi
          bash scripts/acceptance/bootstrap-production-like.sh
          php artisan serve --host=127.0.0.1 --port=8080 >/tmp/oteryn-acceptance-server.log 2>&1 &
          echo $! >/tmp/oteryn-acceptance-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/oteryn-acceptance-server.log >&2 || true
          exit 1

      - name: Execute bounded 300-second zero-retry public soak
        id: soak
        if: always()
        continue-on-error: true
        run: |
          SERVER_PID="$(cat /tmp/oteryn-acceptance-server.pid)"
          RSS_LOG="artifacts/acceptance/soak-rss-samples.tsv"
          REDIS_KEYS_BEFORE="$(redis-cli DBSIZE | tr -d '\r')"
          SAMPLER_PID=''
          cleanup_sampler() {
            if [ -n "$SAMPLER_PID" ]; then
              kill "$SAMPLER_PID" >/dev/null 2>&1 || true
              wait "$SAMPLER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup_sampler EXIT
          (
            while kill -0 "$SERVER_PID" 2>/dev/null; do
              RSS_KB="$(ps -o rss= -p "$SERVER_PID" --ppid "$SERVER_PID" 2>/dev/null | awk '{sum += $1} END {print sum + 0}')"
              printf '%s\t%s\n' "$(date +%s)" "$RSS_KB" >> "$RSS_LOG"
              sleep 5
            done
          ) &
          SAMPLER_PID=$!
          STARTED_AT="$(date +%s)"
          set +e
          npm --prefix scripts/acceptance run test:soak
          STATUS=$?
          set -e
          DURATION_SECONDS="$(( $(date +%s) - STARTED_AT ))"
          cleanup_sampler
          SAMPLER_PID=''
          trap - EXIT
          REDIS_KEYS_AFTER="$(redis-cli DBSIZE | tr -d '\r')"
          RSS_START_KB="$(awk 'NR == 1 {print $2}' "$RSS_LOG")"
          RSS_END_KB="$(awk 'END {print $2}' "$RSS_LOG")"
          RSS_MAX_KB="$(awk 'BEGIN {max = 0} {if ($2 > max) max = $2} END {print max}' "$RSS_LOG")"
          cat > artifacts/acceptance/soak-runtime-metrics.json <<JSON
          {
            "exact_tested_sha": "$ACCEPTANCE_SHA",
            "profile": "simulation-soak",
            "browser_project": "soak-chromium",
            "zero_retries": true,
            "target_duration_seconds": $ACCEPTANCE_SOAK_SECONDS,
            "measured_duration_seconds": $DURATION_SECONDS,
            "server_rss_start_kb": ${RSS_START_KB:-0},
            "server_rss_end_kb": ${RSS_END_KB:-0},
            "server_rss_max_kb": ${RSS_MAX_KB:-0},
            "redis_keys_before": ${REDIS_KEYS_BEFORE:-0},
            "redis_keys_after": ${REDIS_KEYS_AFTER:-0},
            "threshold_policy": "calibration-only-no-performance-budget",
            "classification": "STAGING_EVIDENCE_ONLY"
          }
          JSON
          if [ -f artifacts/acceptance/junit.xml ]; then cp artifacts/acceptance/junit.xml artifacts/acceptance/junit-soak.xml; fi
          exit "$STATUS"

      - name: Write comprehensive non-secret evidence
        if: always()
        env:
          FULL_OUTCOME: ${{ steps.full.outcome }}
          PORTABILITY_OUTCOME: ${{ steps.portability.outcome }}
          RESPONSIVE_OUTCOME: ${{ steps.responsive.outcome }}
          RESILIENCE_OUTCOME: ${{ steps.resilience.outcome }}
          ACCESSIBILITY_OUTCOME: ${{ steps.accessibility.outcome }}
          VISUAL_SEED_OUTCOME: ${{ steps.visual_seed.outcome }}
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
          SOAK_RESET_OUTCOME: ${{ steps.soak_reset.outcome }}
          SOAK_OUTCOME: ${{ steps.soak.outcome }}
        run: |
          mkdir -p artifacts/acceptance
          cp /tmp/oteryn-acceptance-server.log artifacts/acceptance/server.log 2>/dev/null || true
          cat > artifacts/acceptance/comprehensive-simulation-evidence.json <<JSON
          {
            "exact_tested_sha": "$ACCEPTANCE_SHA",
            "zero_retries": true,
            "full_outcome": "$FULL_OUTCOME",
            "portability_outcome": "$PORTABILITY_OUTCOME",
            "responsive_outcome": "$RESPONSIVE_OUTCOME",
            "resilience_outcome": "$RESILIENCE_OUTCOME",
            "accessibility_outcome": "$ACCESSIBILITY_OUTCOME",
            "visual_seed_outcome": "$VISUAL_SEED_OUTCOME",
            "visual_outcome": "$VISUAL_OUTCOME",
            "soak_reset_outcome": "$SOAK_RESET_OUTCOME",
            "soak_outcome": "$SOAK_OUTCOME",
            "classification": "STAGING_EVIDENCE_ONLY",
            "production_verification": "PENDING"
          }
          JSON

      - name: Upload comprehensive simulation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-production-like-e2e-simulation-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/acceptance
          if-no-files-found: error
          retention-days: 14

      - name: Enforce comprehensive simulation result
        if: always()
        env:
          FULL_OUTCOME: ${{ steps.full.outcome }}
          PORTABILITY_OUTCOME: ${{ steps.portability.outcome }}
          RESPONSIVE_OUTCOME: ${{ steps.responsive.outcome }}
          RESILIENCE_OUTCOME: ${{ steps.resilience.outcome }}
          ACCESSIBILITY_OUTCOME: ${{ steps.accessibility.outcome }}
          VISUAL_SEED_OUTCOME: ${{ steps.visual_seed.outcome }}
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
          SOAK_RESET_OUTCOME: ${{ steps.soak_reset.outcome }}
          SOAK_OUTCOME: ${{ steps.soak.outcome }}
        run: |
          test "$FULL_OUTCOME" = success
          test "$PORTABILITY_OUTCOME" = success
          test "$RESPONSIVE_OUTCOME" = success
          test "$RESILIENCE_OUTCOME" = success
          test "$ACCESSIBILITY_OUTCOME" = success
          test "$VISUAL_SEED_OUTCOME" = success
          test "$VISUAL_OUTCOME" = success
          test "$SOAK_RESET_OUTCOME" = success
          test "$SOAK_OUTCOME" = success
