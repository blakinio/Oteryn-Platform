name: Native OAuth Dependency Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: native-oauth-dependency-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-passport:
    if: github.event.pull_request.number == 119
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install locked dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lock Laravel Passport 13
        run: composer require laravel/passport:^13.0 --no-interaction --no-progress

      - name: Publish Passport migrations
        run: php artisan vendor:publish --tag=passport-migrations --force --no-interaction

      - name: Validate Composer files
        run: composer validate --strict

      - name: Commit locked Composer files and Passport migrations
        shell: bash
        run: |
          git add composer.json composer.lock database/migrations

          if git diff --cached --quiet; then
            echo "Composer files and Passport migrations are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build(auth): publish Passport OAuth migrations"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Upload locked Composer files and migrations
        uses: actions/upload-artifact@v4
        with:
          name: native-oauth-composer-lock-${{ github.run_id }}
          path: |
            composer.json
            composer.lock
            database/migrations/*oauth*.php
          retention-days: 1
          if-no-files-found: error
