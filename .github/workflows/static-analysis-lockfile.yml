name: Static Analysis Lockfile Bootstrap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  resolve-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Resolve static-analysis dependencies
        run: composer update larastan/larastan phpstan/phpstan --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Commit resolved lockfile when changed
        run: |
          if ! git diff --quiet -- composer.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add composer.lock
            git commit -m "build: update Composer lockfile for static analysis"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Upload resolved lockfile
        uses: actions/upload-artifact@v4
        with:
          name: composer-lock
          path: composer.lock
          if-no-files-found: error
          retention-days: 1
