name: Build Synology Staging Images

on:
  pull_request:
    branches:
      - main
    paths:
      - composer.json
      - composer.lock
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - public/**
      - resources/**
      - routes/**
      - services/game-gateway/**
      - deploy/synology/docker/**
      - .github/workflows/build-synology-staging-images.yml
  push:
    branches:
      - main
    paths:
      - composer.json
      - composer.lock
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - public/**
      - resources/**
      - routes/**
      - services/game-gateway/**
      - deploy/synology/docker/**
      - .github/workflows/build-synology-staging-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: synology-staging-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: platform
            image: ghcr.io/blakinio/oteryn-platform
            dockerfile: deploy/synology/docker/platform.Dockerfile
          - name: game-gateway
            image: ghcr.io/blakinio/oteryn-game-gateway
            dockerfile: deploy/synology/docker/gateway.Dockerfile

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=synology-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=synology-${{ matrix.name }}

      - name: Validate locally loaded pull-request image
        if: github.event_name == 'pull_request'
        env:
          IMAGE_REF: ${{ matrix.image }}:sha-${{ github.event.pull_request.head.sha }}
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker image inspect "$IMAGE_REF" >/dev/null
          if [ "$IMAGE_NAME" = "platform" ]; then
            docker run --rm --entrypoint php "$IMAGE_REF" -v
          else
            docker run --rm --entrypoint /bin/sh "$IMAGE_REF" -ec 'test -x /usr/local/bin/game-gateway'
          fi
