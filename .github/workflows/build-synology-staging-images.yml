name: Build Synology Staging Images

on:
  pull_request:
    branches:
      - main
    paths:
      - composer.json
      - composer.lock
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - public/**
      - resources/**
      - routes/**
      - services/game-gateway/**
      - deploy/synology/**
      - .github/workflows/build-synology-staging-images.yml
      - .github/workflows/deploy-synology-staging.yml
  push:
    branches:
      - main
    paths:
      - composer.json
      - composer.lock
      - app/**
      - bootstrap/**
      - config/**
      - database/**
      - public/**
      - resources/**
      - routes/**
      - services/game-gateway/**
      - deploy/synology/**
      - .github/workflows/build-synology-staging-images.yml
      - .github/workflows/deploy-synology-staging.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: synology-staging-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deployment:
    name: Validate Synology deployment package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v7

      - name: Validate shell syntax
        run: |
          set -euo pipefail
          bash -n \
            deploy/synology/scripts/lib.sh \
            deploy/synology/scripts/deploy.sh \
            deploy/synology/scripts/health-check.sh \
            deploy/synology/scripts/rollback.sh \
            deploy/synology/runner/entrypoint.sh
          sh -n \
            deploy/synology/tls/init.sh \
            deploy/synology/mariadb/init/10-platform-database.sh

      - name: Validate Compose manifests and containerized runner boundary
        run: |
          set -euo pipefail
          env_file=/tmp/oteryn-synology.env
          project="oteryn-boundary-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cp deploy/synology/.env.example "$env_file"
          sed -E -i 's/=(REQUIRED_[A-Z0-9_]+)$/=localplaceholder/' "$env_file"

          runtime_compose=(
            docker compose
            -p "$project"
            --env-file "$env_file"
            -f deploy/synology/compose.yml
          )
          cleanup() {
            "${runtime_compose[@]}" down -v --remove-orphans >/dev/null 2>&1 || true
            rm -f "$env_file" /tmp/oteryn-runtime-compose.json
          }
          trap cleanup EXIT

          "${runtime_compose[@]}" config --quiet
          "${runtime_compose[@]}" config --format json > /tmp/oteryn-runtime-compose.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('/tmp/oteryn-runtime-compose.json').read_text())
          bind_mounts = []
          for service_name, service in data.get('services', {}).items():
              for mount in service.get('volumes', []) or []:
                  if mount.get('type') == 'bind':
                      bind_mounts.append((service_name, mount.get('source'), mount.get('target')))
          if bind_mounts:
              raise SystemExit(f'runtime Compose must not depend on runner checkout bind mounts: {bind_mounts}')
          PY

          "${runtime_compose[@]}" pull tls-init
          "${runtime_compose[@]}" create tls-init
          tls_container="$("${runtime_compose[@]}" ps -a -q tls-init)"
          test -n "$tls_container"
          docker cp deploy/synology/tls/init.sh "$tls_container:/bootstrap/tls-init.sh"
          docker cp deploy/synology/nginx/internal.conf "$tls_container:/bootstrap/internal-nginx.conf"
          bootstrap_volume="$(docker inspect --format '{{range .Mounts}}{{if eq .Destination "/bootstrap"}}{{.Name}}{{end}}{{end}}' "$tls_container")"
          test -n "$bootstrap_volume"
          docker run --rm \
            -v "$bootstrap_volume:/bootstrap:ro" \
            alpine:3.22 \
            /bin/sh -ec 'test -s /bootstrap/tls-init.sh && test -s /bootstrap/internal-nginx.conf'

          if grep -q 'http://${OTERYN_BIND_ADDRESS}' deploy/synology/scripts/health-check.sh; then
            echo 'Health checks must not probe the containerized runner loopback.' >&2
            exit 1
          fi
          grep -q -- '--network "container:' deploy/synology/scripts/health-check.sh

          docker compose \
            --env-file deploy/synology/runner/.env.example \
            -f deploy/synology/runner/compose.yml \
            config --quiet

  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: platform
            image: ghcr.io/blakinio/oteryn-platform
            dockerfile: deploy/synology/docker/platform.Dockerfile
          - name: game-gateway
            image: ghcr.io/blakinio/oteryn-game-gateway
            dockerfile: deploy/synology/docker/gateway.Dockerfile
          - name: deploy-runner
            image: ghcr.io/blakinio/oteryn-deploy-runner
            dockerfile: deploy/synology/runner/Dockerfile

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=long
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=synology-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=synology-${{ matrix.name }}

      - name: Validate locally loaded pull-request image
        if: github.event_name == 'pull_request'
        env:
          IMAGE_REF: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          IMAGE_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          docker image inspect "$IMAGE_REF" >/dev/null
          case "$IMAGE_NAME" in
            platform)
              docker run --rm --entrypoint php "$IMAGE_REF" -v
              ;;
            game-gateway)
              docker run --rm --entrypoint /bin/sh "$IMAGE_REF" -ec 'test -x /usr/local/bin/game-gateway'
              ;;
            deploy-runner)
              docker run --rm --entrypoint /bin/bash "$IMAGE_REF" -ec 'docker --version && docker compose version && test -x /usr/local/bin/oteryn-runner-entrypoint'
              ;;
          esac
