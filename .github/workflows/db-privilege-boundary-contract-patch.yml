name: Temporary DB privilege contract patch

on:
  push:
    branches:
      - task/OTERYN-20260718-db-privilege-boundary

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task/OTERYN-20260718-db-privilege-boundary

      - name: Patch contract and remove temporary workflow
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/contracts/CANARY_DATA_CONTRACT.md')
          text = path.read_text()
          marker = '## Remaining UNKNOWN items\n'
          section = '''## Database privilege boundary for Oteryn Platform\n\n### Required deployment invariant\n\nThe dedicated Laravel `canary` connection is read-only by contract **and must also be read-only by database privilege enforcement**. A username such as `oteryn_readonly` or application code that intends to issue only `SELECT` statements is not a security boundary by itself.\n\nProduction and production-like deployments must satisfy all of the following:\n\n- use a database credential dedicated to Oteryn Platform for the `canary` connection;\n- never reuse the credential used by the Canary game server;\n- never configure the `canary` connection with a root, administrator, migration-owner or other broadly privileged database account;\n- enforce least privilege at the MySQL/MariaDB server with direct table-level `SELECT` only;\n- do not grant `INSERT`, `UPDATE`, `DELETE`, `CREATE`, `ALTER`, `DROP`, `TRIGGER`, `GRANT OPTION`, schema-wide/global privileges or any other privilege not required by the implemented read surface;\n- treat role-based or otherwise indirect/unrecognized privilege arrangements as unverified unless the deployment check can deterministically expand and validate them; the current verifier intentionally fails closed instead of assuming they are safe.\n\n### Current implemented table allowlist\n\nThe current Oteryn Platform code on this contract revision reads exactly these Canary tables through `app/PublicGameData/CanaryGameDataRepository.php`:\n\n- `players`;\n- `guilds`;\n- `guild_membership`;\n- `guild_ranks`;\n- `channels`.\n\nThe provisioning artifact under `database/provisioning/canary-readonly.sql.template` and the application verifier must grant/accept exactly this implemented table surface. Contract approval for a future read does not justify pre-granting an unused table. In particular, `cluster_sessions` is approved above for the future bounded online-list adapter but is **not** part of the current database credential allowlist until application code actually implements that read.\n\nWhenever a change adds another Canary table to the implemented read surface, that same reviewed change must update:\n\n1. the evidence-backed read contract;\n2. the database provisioning grants;\n3. the privilege-verifier allowlist and regression tests.\n\nDeployment must update the database grants before or atomically with enabling code that requires the new table. Stale excess grants must be removed rather than left in place for convenience.\n\n### Non-destructive verification\n\nDeployments must run `php artisan canary:verify-db-privileges` (or an equivalent deterministic deployment check) against the actual `canary` connection before treating the boundary as enforced. The current command inspects `SHOW GRANTS FOR CURRENT_USER`, never logs raw grant statements, never logs a password, and never attempts a destructive write test. It fails when required table `SELECT` grants are missing or when it sees write/DDL/admin/global/schema-wide/extra-table grants, `GRANT OPTION`, role grants or another grant shape it cannot prove safe.\n\nThe exact production MySQL/MariaDB server product/version remains `UNKNOWN` from repository evidence. The committed provisioning and verifier therefore target direct grant syntax common to MySQL/MariaDB (Canary is built with `libmariadb`, while Laravel uses the MySQL driver) and deliberately report unsupported privilege models as unverified rather than claiming enforcement.\n\n'''
          if marker not in text:
              raise SystemExit('contract marker not found')
          if '## Database privilege boundary for Oteryn Platform' not in text:
              text = text.replace(marker, section + marker, 1)
              path.write_text(text)

          Path('.github/workflows/db-privilege-boundary-contract-patch.yml').unlink()

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/contracts/CANARY_DATA_CONTRACT.md .github/workflows/db-privilege-boundary-contract-patch.yml
          git commit -m "docs: require Canary database least privilege"
          git push origin HEAD:task/OTERYN-20260718-db-privilege-boundary
