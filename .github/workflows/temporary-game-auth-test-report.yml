name: Temporary Game Auth Test Report

on:
  push:
    branches:
      - task/OTERYN-20260722-game-ticket-http-boundary

permissions:
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: task/OTERYN-20260722-game-ticket-http-boundary
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Capture focused test report
        run: |
          php artisan test tests/Feature/GameAuth/Http --stop-on-failure --colors=never > /tmp/game-auth-test-report.txt 2>&1 || true
          cp /tmp/game-auth-test-report.txt docs/agents/tasks/active/OTERYN-20260722-game-ticket-http-boundary.tests.txt

      - name: Commit report and remove temporary workflow
        run: |
          rm .github/workflows/temporary-game-auth-test-report.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(auth): capture temporary focused test report"
          git push origin HEAD:task/OTERYN-20260722-game-ticket-http-boundary
