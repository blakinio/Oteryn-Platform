name: Inspect Synology Actions Evidence

on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/inspect-synology-actions-evidence.yml]

permissions:
  actions: read
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: List one-shot and deployment runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha=e08548866e6edc70f69eaba40249303b69236625
          for wf in one-shot-synology-staging-deploy.yml deploy-synology-staging.yml; do
            echo "=== $wf ==="
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/$wf/runs?per_page=100" \
              --jq ".workflow_runs[] | select(.head_sha == \"$sha\") | {id,name,event,status,conclusion,head_sha,created_at,updated_at}"
          done
