name: Game Auth Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: game-auth-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-ci-root-password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CANARY_PROVISIONING_INTEGRATION_HOST: 127.0.0.1
      CANARY_PROVISIONING_INTEGRATION_PORT: 3306
      CANARY_PROVISIONING_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
      CANARY_CHARACTER_CREATE_INTEGRATION_HOST: 127.0.0.1
      CANARY_CHARACTER_CREATE_INTEGRATION_PORT: 3306
      CANARY_CHARACTER_CREATE_INTEGRATION_ROOT_PASSWORD: oteryn-ci-root-password
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Capture PHPStan diagnostics
        shell: bash
        run: |
          set +e
          composer analyse > /tmp/game-auth-phpstan.txt 2>&1
          echo "$?" > /tmp/game-auth-phpstan.exit
          exit 0

      - name: Capture test diagnostics
        shell: bash
        run: |
          set +e
          composer test > /tmp/game-auth-tests.txt 2>&1
          echo "$?" > /tmp/game-auth-tests.exit
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: game-auth-diagnostics-${{ github.run_id }}
          path: |
            /tmp/game-auth-phpstan.txt
            /tmp/game-auth-phpstan.exit
            /tmp/game-auth-tests.txt
            /tmp/game-auth-tests.exit
          retention-days: 1
          if-no-files-found: error
