name: MFA TOTP Provider Resolution

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/mfa-totp-provider-resolution.yml

permissions:
  contents: write

concurrency:
  group: mfa-totp-provider-resolution-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  resolve:
    if: github.event.pull_request.number == 15 && github.event.pull_request.head.ref == 'task/OTERYN-20260719-mfa-totp-provider-resolution'
    runs-on: ubuntu-latest
    steps:
      - name: Check out task branch
        uses: actions/checkout@v6
        with:
          ref: task/OTERYN-20260719-mfa-totp-provider-resolution
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Resolve maintained TOTP provider with Composer
        run: composer require pragmarx/google2fa:^9.0 --no-interaction --no-progress

      - name: Verify resolver changed dependency metadata only
        shell: bash
        run: |
          unexpected="$(git status --short | awk '$2 != "composer.json" && $2 != "composer.lock" { print }')"
          if [ -n "$unexpected" ]; then
            echo "Unexpected working-tree changes from Composer:"
            echo "$unexpected"
            exit 1
          fi

          git diff --check
          composer validate --strict

      - name: Commit Composer-generated dependency metadata
        shell: bash
        run: |
          if git diff --quiet -- composer.json composer.lock; then
            echo "Composer produced no dependency metadata changes."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.json composer.lock
          git commit -m "build(identity): add maintained TOTP provider"
          git push origin HEAD:task/OTERYN-20260719-mfa-totp-provider-resolution
