name: Game Auth Ticket Concurrency

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: game-auth-ticket-concurrency-${{ github.ref }}
  cancel-in-progress: true

jobs:
  concurrency-proof:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: oteryn-concurrency-root
          MARIADB_DATABASE: oteryn_concurrency
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: oteryn_concurrency
      DB_USERNAME: root
      DB_PASSWORD: oteryn-concurrency-root
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      GAME_AUTH_CONCURRENCY_TEST: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: pdo_mysql, pcntl
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run independent-process MariaDB game auth concurrency proof
        run: php artisan test --filter=GameTicketConcurrencyTest
