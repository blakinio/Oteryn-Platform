name: MFA Static Diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - app/**
      - tests/**
      - .github/workflows/mfa-static-diagnostics.yml

permissions:
  contents: read

jobs:
  phpstan-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies from lockfile
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Capture PHPStan report
        shell: bash
        run: vendor/bin/phpstan analyse --memory-limit=1G --error-format=raw > phpstan-report.txt 2>&1 || true

      - name: Upload PHPStan report
        uses: actions/upload-artifact@v4
        with:
          name: mfa-phpstan-report
          path: phpstan-report.txt
          if-no-files-found: error
