name: Wiki Pint Diagnostic

on:
  push:
    branches:
      - feat/OTERYN-20260724-wiki-foundation

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --quiet

      - name: Apply canonical formatting
        run: >-
          vendor/bin/pint
          app/Wiki
          database/migrations/2026_07_24_231000_create_wiki_foundation_tables.php
          tests/Unit/Wiki
          tests/Feature/Wiki

      - name: Capture formatter patch
        run: >-
          git diff --binary --
          app/Wiki
          database/migrations/2026_07_24_231000_create_wiki_foundation_tables.php
          tests/Unit/Wiki
          tests/Feature/Wiki
          > wiki-pint.patch

      - name: Upload formatter patch
        uses: actions/upload-artifact@v4
        with:
          name: wiki-pint-patch
          path: wiki-pint.patch
          if-no-files-found: error
          retention-days: 1
