events {}

http {
    access_log off;
    error_log /dev/stderr warn;

    server {
        listen 8443 ssl;
        server_name platform-internal;

        ssl_certificate /etc/nginx/tls/platform-internal.crt;
        ssl_certificate_key /etc/nginx/tls/platform-internal.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://platform:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8444 ssl;
        server_name canary-session-internal;

        ssl_certificate /etc/nginx/tls/canary-session-internal.crt;
        ssl_certificate_key /etc/nginx/tls/canary-session-internal.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://canary:7180;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
